<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Market Visualizer</title>
<link rel="icon" href="data:,">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0a0f;
  --bg2: #12121a;
  --bg3: #181822;
  --fg: #e0e0e8;
  --fg2: #888894;
  --fg3: #b5b5c2;
}

body {
  background: var(--bg);
  color: var(--fg);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
}

a { color: var(--fg2); }

#wrapper {
  max-width: 1400px;
  width: 100%;
  margin: 0 auto;
  padding-bottom: 250px;
}

#header {
  padding: 20px 28px 16px;
  flex-shrink: 0;
}

.intro {
  margin-bottom: 18px;
}

.intro h1 {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
}

.intro h1 a {
  font-size: 13px;
  font-weight: 400;
  color: var(--fg2);
  text-decoration: none;
}

.intro h1 a:hover,
.intro a:hover { text-decoration: underline; }

.meta-line {
  font-size: 12px;
  color: var(--fg2);
  margin-bottom: 12px;
}

#introCopy p {
  font-size: 15px;
  line-height: 1.6;
  color: var(--fg2);
  margin-bottom: 8px;
}

#introCopy strong, #introCopy b { color: var(--fg); font-weight: 600; }

.intro details { margin: 10px 0; }
.intro summary {
  font-size: 14px;
  color: var(--fg2);
  cursor: pointer;
  user-select: none;
}
.intro summary:hover { color: var(--fg); }
.intro .prompt-box {
  margin-top: 8px;
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 6px;
  padding: 12px 16px;
  font-family: "SF Mono", "Menlo", "Consolas", monospace;
  font-size: 11px;
  line-height: 1.5;
  color: var(--fg2);
  max-height: 300px;
  overflow-y: auto;
  white-space: pre-wrap;
  word-break: break-word;
}

.controls-row {
  display: flex;
  align-items: flex-end;
  gap: 14px;
  flex-wrap: wrap;
  margin-bottom: 14px;
}

.stats-row {
  display: flex;
  flex-wrap: wrap;
  gap: 20px 28px;
  align-items: flex-start;
  margin-bottom: 12px;
}

.stat-section {
  display: flex;
  flex-direction: column;
  gap: 5px;
  min-width: 110px;
}

.stat-section h3 {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--fg2);
}

.stat-big {
  font-size: 32px;
  font-weight: 700;
  letter-spacing: -0.03em;
  line-height: 1;
}

.stat-label {
  font-size: 11px;
  color: var(--fg2);
  max-width: 160px;
  line-height: 1.35;
}

.geo-toggle,
.color-toggle {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

.geo-toggle[hidden],
.color-toggle[hidden],
.mode-chip[hidden] {
  display: none !important;
}

.geo-toggle button,
.color-toggle button {
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 500;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 999px;
  background: transparent;
  color: var(--fg2);
  cursor: pointer;
  transition: all 0.15s;
}

.color-toggle button { border-radius: 4px; }

.geo-toggle button.active,
.color-toggle button.active {
  background: rgba(255,255,255,0.08);
  color: var(--fg);
  border-color: rgba(255,255,255,0.2);
}

.geo-toggle button:hover:not(.active),
.color-toggle button:hover:not(.active) {
  background: rgba(255,255,255,0.04);
}

.mode-chip {
  font-size: 12px;
  color: var(--fg3);
  padding: 8px 12px;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 999px;
  background: rgba(255,255,255,0.03);
}

.gradient-legend {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--fg2);
}

.gradient-legend canvas { border-radius: 2px; }

.tier-bar { display: flex; flex-direction: column; gap: 3px; }
.tier-row { display: flex; align-items: center; gap: 6px; font-size: 12px; }
.tier-color { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
.tier-name { flex: 1; color: var(--fg2); white-space: nowrap; }
.tier-jobs { text-align: right; white-space: nowrap; }
.tier-pct { text-align: right; width: 36px; color: var(--fg2); font-size: 11px; }

.histogram { display: flex; align-items: flex-end; gap: 2px; height: 54px; }
.histogram .bar { flex: 1; border-radius: 1px 1px 0 0; min-height: 1px; }
.hist-labels { display: flex; justify-content: space-between; font-size: 10px; color: var(--fg2); margin-top: 2px; }

.hbar-chart { display: flex; flex-direction: column; gap: 3px; min-width: 210px; }
.hbar-row { display: flex; align-items: center; gap: 6px; font-size: 12px; }
.hbar-label { width: 90px; flex-shrink: 0; color: var(--fg2); font-size: 11px; text-align: right; }
.hbar-track { flex: 1; height: 12px; background: rgba(255,255,255,0.04); border-radius: 2px; overflow: hidden; min-width: 36px; }
.hbar-fill { height: 100%; border-radius: 2px; }
.hbar-val { width: 52px; flex-shrink: 0; font-size: 11px; color: var(--fg); text-align: right; }

.mini-note {
  font-size: 11px;
  color: var(--fg2);
  line-height: 1.4;
  max-width: 180px;
}

canvas#canvas {
  display: block;
  cursor: default;
}

#tooltip {
  position: fixed;
  pointer-events: none;
  background: var(--bg2);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 13px;
  line-height: 1.5;
  max-width: 360px;
  opacity: 0;
  transition: opacity 0.12s;
  z-index: 20;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
}

#tooltip.visible { opacity: 1; }
#tooltip .tt-title { font-weight: 600; font-size: 14px; margin-bottom: 6px; color: #fff; }
#tooltip .tt-exposure { font-size: 12px; margin-bottom: 8px; }
#tooltip .tt-stats { display: grid; grid-template-columns: auto auto; gap: 2px 12px; font-size: 12px; }
#tooltip .tt-stats .label { color: var(--fg2); }
#tooltip .tt-stats .value { color: var(--fg); text-align: right; }
#tooltip .tt-rationale {
  font-size: 11px;
  color: var(--fg2);
  margin-top: 8px;
  line-height: 1.4;
  border-top: 1px solid rgba(255,255,255,0.06);
  padding-top: 8px;
}
#tooltip .tt-country-breakdown {
  margin-top: 8px;
  border-top: 1px solid rgba(255,255,255,0.06);
  padding-top: 8px;
}
#tooltip .tt-country-title {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--fg2);
  margin-bottom: 6px;
}
#tooltip .tt-country-row {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  font-size: 11px;
  color: var(--fg3);
}

@media (max-width: 900px) {
  #header { padding: 18px 18px 12px; }
  .intro h1 { font-size: 24px; }
  .controls-row, .stats-row { gap: 16px 18px; }
  .hbar-chart { min-width: 180px; }
}

@media (max-width: 640px) {
  .intro h1 { font-size: 22px; }
  .stat-big { font-size: 28px; }
  .hbar-label { width: 78px; }
  #tooltip { max-width: min(340px, calc(100vw - 24px)); }
}
</style>
</head>
<body>

<div id="wrapper">
  <div id="header">
    <div class="intro">
      <h1><span id="pageTitle">Job Market Visualizer</span> <a class="repo-link" href="https://github.com/bozliu/jobs">GitHub</a></h1>
      <div class="meta-line" id="regionMeta"></div>
      <div id="introCopy"></div>
      <details id="promptDetails" hidden>
        <summary>View the Digital AI Exposure scoring prompt</summary>
        <div class="prompt-box" id="promptBox"></div>
      </details>
    </div>

    <div class="controls-row">
      <div class="stat-section">
        <h3>Region</h3>
        <div class="geo-toggle" id="regionToggle">
          <button data-region="us" class="active">US</button>
          <button data-region="asia">Asia</button>
          <button data-region="europe">Europe</button>
        </div>
      </div>

      <div class="stat-section" id="modeSection">
        <h3>Layer</h3>
        <div class="color-toggle" id="colorToggle">
          <button data-mode="outlook" class="active">BLS Outlook</button>
          <button data-mode="pay">Median Pay</button>
          <button data-mode="education">Education</button>
          <button data-mode="exposure">Digital AI Exposure</button>
        </div>
        <div class="mode-chip" id="modeChip" hidden>Area = Employment · Color = Digital AI Exposure</div>
      </div>

      <div class="gradient-legend">
        <span id="legendLow">Declining</span>
        <canvas id="gradientLegend" width="80" height="8"></canvas>
        <span id="legendHigh">Growing</span>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-section">
        <h3>Total jobs</h3>
        <div class="stat-big" id="statTotalJobs">&mdash;</div>
      </div>
      <div class="stat-section" id="block2"></div>
      <div class="stat-section" id="block3"></div>
      <div class="stat-section" id="block4"></div>
      <div class="stat-section" id="block5"></div>
      <div class="stat-section" id="block6"></div>
      <div class="stat-section" id="block7"></div>
      <div class="stat-section" id="block8"></div>
    </div>
  </div>

  <canvas id="canvas"></canvas>
</div>

<div id="tooltip">
  <div class="tt-title"></div>
  <div class="tt-exposure"></div>
  <div class="tt-stats"></div>
  <div class="tt-rationale"></div>
  <div class="tt-country-breakdown"></div>
</div>

<script>
let payload = null;
let activeRegion = "us";
let usMode = "outlook";
let colorMode = "outlook";
let data = [];
let rects = [];
let hovered = null;

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
let dpr = window.devicePixelRatio || 1;
const MARGIN = 12;
const GAP = 1.5;

const EDU_LEVELS = [
  "No formal educational credential",
  "High school diploma or equivalent",
  "Postsecondary nondegree award",
  "Some college, no degree",
  "Associate's degree",
  "Bachelor's degree",
  "Master's degree",
  "Doctoral or professional degree",
];

const PAY_BANDS = [
  { label: "<$35K", min: 0, max: 35000 },
  { label: "$35–50K", min: 35000, max: 50000 },
  { label: "$50–75K", min: 50000, max: 75000 },
  { label: "$75–100K", min: 75000, max: 100000 },
  { label: "$100K+", min: 100000, max: Infinity },
];

const EDU_GROUPS = [
  { label: "No degree/HS", match: ["No formal educational credential", "High school diploma or equivalent"] },
  { label: "Postsec/Assoc", match: ["Postsecondary nondegree award", "Some college, no degree", "Associate's degree"] },
  { label: "Bachelor's", match: ["Bachelor's degree"] },
  { label: "Master's", match: ["Master's degree"] },
  { label: "Doctoral/Prof", match: ["Doctoral or professional degree"] },
];

const OUTLOOK_TIERS = [
  { label: "Declining (<0%)", min: -Infinity, max: -1 },
  { label: "Slow (0–3%)", min: 0, max: 3 },
  { label: "Average (4–7%)", min: 4, max: 7 },
  { label: "Fast (8–14%)", min: 8, max: 14 },
  { label: "Much faster (15%+)", min: 15, max: Infinity },
];

const LEGEND_CONFIG = {
  exposure:  { low: "Low", high: "High" },
  outlook:   { low: "Declining", high: "Growing" },
  pay:       { low: "$25K", high: "$250K" },
  education: { low: "No degree", high: "Doctoral" },
};

function currentView() {
  return payload.views[activeRegion];
}

function isUSView() {
  return activeRegion === "us";
}

function formatNumber(n) {
  if (n == null) return "—";
  if (n >= 1e9) return (n / 1e9).toFixed(1).replace(/\.0$/, "") + "B";
  if (n >= 1e6) return (n / 1e6).toFixed(1).replace(/\.0$/, "") + "M";
  if (n >= 1e3) return Math.round(n / 1e3) + "K";
  return n.toLocaleString();
}

function formatBigNumber(n) {
  if (n == null) return "—";
  if (n >= 1e9) return (n / 1e9).toFixed(2).replace(/0$/, "").replace(/\.$/, "") + "B";
  if (n >= 1e6) return (n / 1e6).toFixed(1).replace(/\.0$/, "") + "M";
  return formatNumber(n);
}

function formatPay(n) {
  return n == null ? "—" : "$" + n.toLocaleString();
}

function boostContrast(t) {
  const c = (t - 0.5) * 2;
  const b = Math.sign(c) * Math.pow(Math.abs(c), 0.55);
  return b / 2 + 0.5;
}

function greenRedCSS(t, alpha) {
  t = boostContrast(Math.max(0, Math.min(1, t)));
  let r, g, b;
  if (t < 0.5) {
    const s = t / 0.5;
    r = Math.round(30 + s * 200);
    g = Math.round(180 - s * 20);
    b = Math.round(40 - s * 20);
  } else {
    const s = (t - 0.5) / 0.5;
    r = Math.round(230 + s * 25);
    g = Math.round(160 - s * 130);
    b = Math.round(20 - s * 5);
  }
  return `rgba(${r},${g},${b},${alpha})`;
}

function outlookColor(v, a) {
  if (v == null) return `rgba(128,128,128,${a})`;
  return greenRedCSS(1 - Math.max(0, Math.min(1, (v + 12) / 24)), a);
}
function payColor(v, a) {
  if (v == null) return `rgba(128,128,128,${a})`;
  const t = 1 - (Math.log(Math.max(25000, Math.min(250000, v))) - Math.log(25000)) / (Math.log(250000) - Math.log(25000));
  return greenRedCSS(t, a);
}
function eduColor(idx, a) {
  if (idx < 0) return `rgba(128,128,128,${a})`;
  return greenRedCSS(1 - idx / (EDU_LEVELS.length - 1), a);
}
function exposureColor(v, a) {
  if (v == null) return `rgba(128,128,128,${a})`;
  return greenRedCSS(v / 10, a);
}

function tileColorCSS(d, alpha) {
  if (!isUSView()) return exposureColor(d.exposure, alpha);
  if (colorMode === "exposure") return exposureColor(d.exposure, alpha);
  if (colorMode === "outlook") return outlookColor(d.outlook, alpha);
  if (colorMode === "pay") return payColor(d.pay, alpha);
  if (colorMode === "education") return eduColor(EDU_LEVELS.indexOf(d.education), alpha);
  return `rgba(128,128,128,${alpha})`;
}

function tileSubInfo(r) {
  if (!isUSView()) {
    return (r.exposure != null ? r.exposure + "/10" : "") +
      (r.jobs ? " · " + formatNumber(r.jobs) + " jobs" : "");
  }
  if (colorMode === "exposure") {
    return (r.exposure != null ? r.exposure + "/10" : "") +
      (r.jobs ? " · " + formatNumber(r.jobs) + " jobs" : "");
  }
  if (colorMode === "outlook") {
    const o = r.outlook != null ? (r.outlook > 0 ? "+" : "") + r.outlook + "%" : "";
    return o + (r.jobs ? " · " + formatNumber(r.jobs) + " jobs" : "");
  }
  if (colorMode === "pay") {
    return (r.pay != null ? formatPay(r.pay) : "") +
      (r.jobs ? " · " + formatNumber(r.jobs) + " jobs" : "");
  }
  if (colorMode === "education") {
    const short = {
      "No formal educational credential": "No formal",
      "High school diploma or equivalent": "HS diploma",
      "Postsecondary nondegree award": "Postsecondary",
      "Some college, no degree": "Some college",
      "Associate's degree": "Associate's",
      "Bachelor's degree": "Bachelor's",
      "Master's degree": "Master's",
      "Doctoral or professional degree": "Doctoral/Prof",
    }[r.education] || "";
    return short + (r.jobs ? " · " + formatNumber(r.jobs) + " jobs" : "");
  }
  return "";
}

function squarify(items, x, y, w, h) {
  if (items.length === 0) return [];
  if (items.length === 1) return [{ ...items[0], rx: x, ry: y, rw: w, rh: h }];
  const total = items.reduce((s, d) => s + d.value, 0);
  if (total === 0) return [];
  const results = [];
  let remaining = [...items], cx = x, cy = y, cw = w, ch = h;
  while (remaining.length > 0) {
    const remTotal = remaining.reduce((s, d) => s + d.value, 0);
    const vertical = cw >= ch;
    const side = vertical ? ch : cw;
    let row = [remaining[0]], rowSum = remaining[0].value;
    for (let i = 1; i < remaining.length; i++) {
      const candidate = [...row, remaining[i]];
      const candidateSum = rowSum + remaining[i].value;
      if (worstAspect(candidate, candidateSum, side, remTotal, vertical ? cw : ch) <
          worstAspect(row, rowSum, side, remTotal, vertical ? cw : ch)) {
        row = candidate;
        rowSum = candidateSum;
      } else break;
    }
    const rowFraction = rowSum / remTotal;
    const rowThickness = vertical ? cw * rowFraction : ch * rowFraction;
    let offset = 0;
    for (const item of row) {
      const itemFraction = item.value / rowSum;
      const itemLength = side * itemFraction;
      if (vertical) results.push({ ...item, rx: cx, ry: cy + offset, rw: rowThickness, rh: itemLength });
      else results.push({ ...item, rx: cx + offset, ry: cy, rw: itemLength, rh: rowThickness });
      offset += itemLength;
    }
    if (vertical) { cx += rowThickness; cw -= rowThickness; }
    else { cy += rowThickness; ch -= rowThickness; }
    remaining = remaining.slice(row.length);
  }
  return results;
}

function worstAspect(row, rowSum, side, totalArea, availableExtent) {
  const rowExtent = availableExtent * (rowSum / totalArea);
  if (rowExtent === 0) return Infinity;
  let worst = 0;
  for (const item of row) {
    const itemLen = side * (item.value / rowSum);
    if (itemLen === 0) continue;
    const aspect = Math.max(rowExtent / itemLen, itemLen / rowExtent);
    if (aspect > worst) worst = aspect;
  }
  return worst;
}

function layout() {
  const wrapper = document.getElementById("wrapper");
  const w = wrapper.clientWidth;
  const h = Math.round(w * 3 / 4);
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + "px";
  canvas.style.height = h + "px";
  const tx = MARGIN, ty = MARGIN, tw = w - MARGIN * 2, th = h - MARGIN * 2;
  const byCategory = {};
  for (const d of data) {
    const cat = d.category || "uncategorized";
    if (!byCategory[cat]) byCategory[cat] = [];
    byCategory[cat].push(d);
  }
  const categories = Object.keys(byCategory).map(cat => ({
    cat,
    items: byCategory[cat].sort((a, b) => (b.jobs || 0) - (a.jobs || 0)),
    value: byCategory[cat].reduce((s, d) => s + (d.jobs || 1), 0),
  })).sort((a, b) => b.value - a.value);
  const catRects = squarify(categories, tx, ty, tw, th);
  rects = [];
  for (const cr of catRects) {
    const items = cr.items.map(d => ({ ...d, value: d.jobs || 1 }));
    const innerRects = squarify(items, cr.rx + GAP, cr.ry + GAP, cr.rw - GAP * 2, cr.rh - GAP * 2);
    for (const ir of innerRects) rects.push(ir);
  }
}

function draw() {
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.fillStyle = "#0a0a0f";
  ctx.fillRect(0, 0, canvas.width / dpr, canvas.height / dpr);
  for (const r of rects) {
    const isHovered = r === hovered;
    const g = GAP / 2, rx = r.rx + g, ry = r.ry + g, rw = r.rw - g * 2, rh = r.rh - g * 2;
    if (rw <= 0 || rh <= 0) continue;
    ctx.fillStyle = tileColorCSS(r, isHovered ? 0.8 : 0.5);
    ctx.fillRect(rx, ry, rw, rh);
    if (isHovered) {
      ctx.strokeStyle = "#fff";
      ctx.lineWidth = 2;
      ctx.strokeRect(rx, ry, rw, rh);
    }
    if (rw > 50 && rh > 18) {
      ctx.save();
      ctx.beginPath();
      ctx.rect(rx + 4, ry + 2, rw - 8, rh - 4);
      ctx.clip();
      const fontSize = Math.min(13, Math.max(9, Math.min(rw / 10, rh / 3)));
      ctx.font = `500 ${fontSize}px -apple-system, system-ui, sans-serif`;
      ctx.fillStyle = isHovered ? "#fff" : "rgba(255,255,255,0.85)";
      ctx.textBaseline = "top";
      ctx.fillText(r.title, rx + 5, ry + 4);
      if (rh > 34 && rw > 60) {
        ctx.font = `400 ${Math.max(8, fontSize - 2)}px -apple-system, system-ui, sans-serif`;
        ctx.fillStyle = "rgba(255,255,255,0.5)";
        ctx.fillText(tileSubInfo(r), rx + 5, ry + 4 + fontSize + 2);
      }
      ctx.restore();
    }
  }
}

function hitTest(mx, my) {
  const rect = canvas.getBoundingClientRect();
  const cx = mx - rect.left, cy = my - rect.top;
  for (let i = rects.length - 1; i >= 0; i--) {
    const r = rects[i];
    if (cx >= r.rx && cx < r.rx + r.rw && cy >= r.ry && cy < r.ry + r.rh) return r;
  }
  return null;
}

function tooltipHighlight(d) {
  const v = d.exposure;
  if (v == null) return "";
  const color = exposureColor(v, 1);
  if (!isUSView() || colorMode === "exposure") {
    return `<span style="color:${color};font-weight:600;">Digital AI Exposure: ${v}/10</span>` +
      `<div style="margin-top:3px;height:4px;background:rgba(255,255,255,0.08);border-radius:2px;">` +
      `<div style="height:100%;width:${v * 10}%;background:${color};border-radius:2px;"></div></div>`;
  }
  if (colorMode === "outlook") {
    const colorOutlook = outlookColor(d.outlook, 1);
    return `<span style="color:${colorOutlook};font-weight:600;">Outlook: ${d.outlook > 0 ? "+" : ""}${d.outlook}%</span>` +
      (d.outlook_desc ? ` <span style="color:var(--fg2);">(${d.outlook_desc})</span>` : "") +
      `<div style="margin-top:3px;height:4px;background:rgba(255,255,255,0.08);border-radius:2px;">` +
      `<div style="height:100%;width:${Math.min(100, Math.max(0, (d.outlook + 10) / 30 * 100))}%;background:${colorOutlook};border-radius:2px;"></div></div>`;
  }
  if (colorMode === "pay") {
    const colorPay = payColor(d.pay, 1);
    return `<span style="color:${colorPay};font-weight:600;">Median Pay: ${formatPay(d.pay)}</span>` +
      `<div style="margin-top:3px;height:4px;background:rgba(255,255,255,0.08);border-radius:2px;">` +
      `<div style="height:100%;width:${Math.min(100, d.pay / 150000 * 100)}%;background:${colorPay};border-radius:2px;"></div></div>`;
  }
  const edu = d.education || "";
  const idx = EDU_LEVELS.indexOf(edu);
  const colorEdu = idx >= 0 ? eduColor(idx, 1) : "var(--fg)";
  return `<span style="color:${colorEdu};font-weight:600;">Education: ${edu || "—"}</span>`;
}

function renderCountryBreakdown(d) {
  if (!d.countryBreakdown || !d.countryBreakdown.length) return "";
  const total = d.countryBreakdown.reduce((sum, item) => sum + item.jobs, 0);
  const rows = d.countryBreakdown
    .slice()
    .sort((a, b) => b.jobs - a.jobs)
    .map(item => {
      const pct = total > 0 ? (item.jobs / total * 100).toFixed(0) : "0";
      return `<div class="tt-country-row"><span>${item.country}</span><span>${formatNumber(item.jobs)} · ${pct}% · ${item.year}</span></div>`;
    })
    .join("");
  return `<div class="tt-country-title">Country mix</div>${rows}`;
}

function showTooltip(d, mx, my) {
  const tt = document.getElementById("tooltip");
  tt.querySelector(".tt-title").textContent = d.title;
  tt.querySelector(".tt-exposure").innerHTML = tooltipHighlight(d);

  if (isUSView()) {
    tt.querySelector(".tt-stats").innerHTML = `
      <span class="label">Median pay</span><span class="value">${formatPay(d.pay)}</span>
      <span class="label">Jobs (2024)</span><span class="value">${formatNumber(d.jobs)}</span>
      <span class="label">Outlook</span><span class="value">${d.outlook != null ? d.outlook + "%" : "—"} ${d.outlook_desc ? "(" + d.outlook_desc + ")" : ""}</span>
      <span class="label">Education</span><span class="value">${d.education || "—"}</span>`;
    tt.querySelector(".tt-country-breakdown").innerHTML = "";
  } else {
    const topCountry = d.countryBreakdown && d.countryBreakdown.length ? d.countryBreakdown[0] : null;
    tt.querySelector(".tt-stats").innerHTML = `
      <span class="label">Regional jobs</span><span class="value">${formatBigNumber(d.jobs)}</span>
      <span class="label">AI exposure</span><span class="value">${d.exposure != null ? d.exposure + "/10" : "—"}</span>
      <span class="label">Top country</span><span class="value">${topCountry ? topCountry.country : "—"}</span>
      <span class="label">Source</span><span class="value">ILOSTAT</span>`;
    tt.querySelector(".tt-country-breakdown").innerHTML = renderCountryBreakdown(d);
  }

  tt.querySelector(".tt-rationale").textContent = d.exposure_rationale || "";
  let tx = mx + 16, ty = my - 16;
  if (tx + 360 > window.innerWidth) tx = mx - 376;
  if (ty < 10) ty = my + 16;
  if (ty + 220 > window.innerHeight) ty = my - 220;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
  tt.classList.add("visible");
}

function hideTooltip() {
  document.getElementById("tooltip").classList.remove("visible");
}

function weightedAvgByGroups(groups, filterFn, metricFn) {
  return groups.map(g => {
    let wS = 0, wC = 0;
    for (const d of data) {
      const v = metricFn(d);
      if (v != null && d.jobs && filterFn(d, g)) {
        wS += v * d.jobs;
        wC += d.jobs;
      }
    }
    return { ...g, avg: wC > 0 ? wS / wC : 0, jobs: wC };
  });
}

function renderTiers(tiers, totalJobs) {
  return tiers.map(t => `<div class="tier-row">
    <div class="tier-color" style="background:${t.color}"></div>
    <span class="tier-name">${t.label}</span>
    <span class="tier-jobs">${formatNumber(t.jobs)}</span>
    <span class="tier-pct">${totalJobs > 0 ? (t.jobs / totalJobs * 100).toFixed(0) : 0}%</span>
  </div>`).join("");
}

function renderHbars(items) {
  return items.map(it => `<div class="hbar-row">
    <span class="hbar-label">${it.label}</span>
    <div class="hbar-track"><div class="hbar-fill" style="width:${it.pct}%;background:${it.color}"></div></div>
    <span class="hbar-val">${it.val}</span>
  </div>`).join("");
}

function updateStats() {
  const view = currentView();
  const summary = view.summary;
  const totalJobs = summary.totalJobs || data.reduce((s, d) => s + (d.jobs || 0), 0);
  document.getElementById("statTotalJobs").textContent = formatBigNumber(totalJobs);

  if (!isUSView()) {
    updateRegionalStats(view, totalJobs);
    return;
  }

  if (colorMode === "outlook") updateOutlookStats(totalJobs);
  else if (colorMode === "pay") updatePayStats(totalJobs);
  else if (colorMode === "education") updateEducationStats(totalJobs);
  else updateExposureStats(totalJobs);
}

function updateOutlookStats(totalJobs) {
  let wS = 0, wC = 0;
  for (const d of data) { if (d.outlook != null && d.jobs) { wS += d.outlook * d.jobs; wC += d.jobs; } }
  const avg = wC > 0 ? wS / wC : 0;
  document.getElementById("block2").innerHTML = `<h3>Avg. outlook</h3>
    <div class="stat-big"><span style="color:${outlookColor(avg, 1)}">${avg > 0 ? "+" : ""}${avg.toFixed(1)}%</span></div>
    <div class="stat-label">job-weighted</div>`;

  const buckets = [
    { lo: -Infinity, hi: -1, mid: -5 }, { lo: 0, hi: 2, mid: 1 }, { lo: 3, hi: 5, mid: 4 },
    { lo: 6, hi: 8, mid: 7 }, { lo: 9, hi: 14, mid: 11 }, { lo: 15, hi: Infinity, mid: 20 },
  ];
  const histJobs = buckets.map(() => 0);
  for (const d of data) {
    if (d.outlook != null && d.jobs) {
      const i = buckets.findIndex(b => d.outlook >= b.lo && d.outlook <= b.hi);
      if (i >= 0) histJobs[i] += d.jobs;
    }
  }
  const maxH = Math.max(...histJobs);
  document.getElementById("block3").innerHTML = `<h3>Jobs by outlook</h3>
    <div class="histogram">${histJobs.map((c, i) => `<div class="bar" style="height:${Math.max(2, maxH > 0 ? c / maxH * 100 : 0)}%;background:${outlookColor(buckets[i].mid, 0.7)}"></div>`).join("")}</div>
    <div class="hist-labels"><span>&lt;0%</span><span>5%</span><span>15%+</span></div>`;

  const tiers = OUTLOOK_TIERS.map(t => {
    let jobs = 0;
    for (const d of data) { if (d.outlook != null && d.jobs && d.outlook >= t.min && d.outlook <= t.max) jobs += d.jobs; }
    return { ...t, jobs, color: outlookColor((t.min === -Infinity ? -8 : t.max === Infinity ? 20 : (t.min + t.max) / 2), 1) };
  });
  document.getElementById("block4").innerHTML = `<h3>Outlook tiers</h3><div class="tier-bar">${renderTiers(tiers, totalJobs)}</div>`;

  const byPay = weightedAvgByGroups(PAY_BANDS, (d, g) => d.pay != null && d.pay >= g.min && d.pay < g.max, d => d.outlook);
  document.getElementById("block5").innerHTML = `<h3>Outlook by pay</h3><div class="hbar-chart">${renderHbars(byPay.map(g => ({
    label: g.label, val: (g.avg > 0 ? "+" : "") + g.avg.toFixed(1) + "%",
    pct: Math.max(0, Math.min(100, (g.avg + 10) / 30 * 100)), color: outlookColor(g.avg, 0.8)
  })))}</div>`;

  const byEdu = weightedAvgByGroups(EDU_GROUPS, (d, g) => g.match.includes(d.education), d => d.outlook);
  document.getElementById("block6").innerHTML = `<h3>Outlook by education</h3><div class="hbar-chart">${renderHbars(byEdu.map(g => ({
    label: g.label, val: (g.avg > 0 ? "+" : "") + g.avg.toFixed(1) + "%",
    pct: Math.max(0, Math.min(100, (g.avg + 10) / 30 * 100)), color: outlookColor(g.avg, 0.8)
  })))}</div>`;

  let declining = 0;
  for (const d of data) { if (d.outlook != null && d.outlook < 0 && d.jobs) declining += d.jobs; }
  document.getElementById("block7").innerHTML = `<h3>Declining jobs</h3>
    <div class="stat-big" style="color:${outlookColor(-5, 1)}">${(declining / 1e6).toFixed(1)}M</div>
    <div class="stat-label">negative outlook</div>`;

  let growing = 0;
  for (const d of data) { if (d.outlook != null && d.outlook > 0 && d.jobs) growing += d.jobs; }
  document.getElementById("block8").innerHTML = `<h3>Growing jobs</h3>
    <div class="stat-big" style="color:${outlookColor(10, 1)}">${(growing / 1e6).toFixed(1)}M</div>
    <div class="stat-label">positive outlook</div>`;
}

function drawGradientLegend() {
  const c = document.getElementById("gradientLegend");
  const gctx = c.getContext("2d");
  const mode = isUSView() ? colorMode : "exposure";
  for (let x = 0; x < 80; x++) {
    const t = x / 79;
    gctx.fillStyle = mode === "exposure" ? greenRedCSS(t, 1) : greenRedCSS(1 - t, 1);
    gctx.fillRect(x, 0, 1, 8);
  }
  const cfg = LEGEND_CONFIG[mode];
  document.getElementById("legendLow").textContent = cfg.low;
  document.getElementById("legendHigh").textContent = cfg.high;
}

  const sourceLabel = isUSView() ? "BLS 2024" : `ILOSTAT · ${summary.yearStrategy === "latest_shared" ? "shared year " + summary.yearLabel : "mixed years"}`;
  document.getElementById("regionMeta").textContent = `${countries} · ${sourceLabel}`;

  const intro = document.getElementById("introCopy");
  intro.innerHTML = (summary.introHtml || []).map(text => `<p>${text}</p>`).join("");
  document.querySelectorAll(".repo-link").forEach(link => { link.href = summary.repoUrl; });

  const promptDetails = document.getElementById("promptDetails");
  const promptBox = document.getElementById("promptBox");
  promptDetails.hidden = !summary.showPrompt;
  promptBox.textContent = summary.promptText || "";
}

function updateModeControls() {
  const toggle = document.getElementById("colorToggle");
  const chip = document.getElementById("modeChip");
  toggle.hidden = !isUSView();
  chip.hidden = isUSView();
  if (isUSView()) {
    document.querySelectorAll("#colorToggle button").forEach(btn => {
      btn.classList.toggle("active", btn.dataset.mode === colorMode);
    });
  }
  document.querySelectorAll("#regionToggle button").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.region === activeRegion);
  });
}

function coerceState(region, mode) {
  const safeRegion = payload.views[region] ? region : (payload.defaultRegion || "us");
  if (safeRegion !== "us") {
    return { region: safeRegion, mode: "exposure" };
  }
  const allowed = new Set(payload.views.us.availableModes || ["outlook"]);
  return { region: safeRegion, mode: allowed.has(mode) ? mode : payload.views.us.defaultMode };
}

function syncUrl() {
  const url = new URL(window.location.href);
  url.searchParams.set("region", activeRegion);
  if (activeRegion === "us") url.searchParams.set("mode", usMode);
  else url.searchParams.delete("mode");
  window.history.replaceState({}, "", url);
}

function applyState({ skipUrl = false } = {}) {
  const view = currentView();
  colorMode = isUSView() ? usMode : view.defaultMode;
  data = view.occupations || [];
  applyPayloadMetadata();
  updateModeControls();
  updateStats();
  drawGradientLegend();
  resize();
  if (!skipUrl) syncUrl();
}

function resize() {
  dpr = window.devicePixelRatio || 1;
  layout();
  draw();
}

canvas.addEventListener("mousemove", (e) => {
  const hit = hitTest(e.clientX, e.clientY);
  if (hit !== hovered) { hovered = hit; draw(); }
  if (hovered) {
    showTooltip(hovered, e.clientX, e.clientY);
    canvas.style.cursor = isUSView() && hovered.url ? "pointer" : "default";
  } else {
    hideTooltip();
    canvas.style.cursor = "default";
  }
});

canvas.addEventListener("click", (e) => {
  const hit = hitTest(e.clientX, e.clientY);
  if (isUSView() && hit && hit.url) window.open(hit.url, "_blank");
});

canvas.addEventListener("mouseleave", () => {
  hovered = null;
  hideTooltip();
  draw();
});

document.getElementById("regionToggle").addEventListener("click", (e) => {
  const btn = e.target.closest("button");
  if (!btn || !btn.dataset.region) return;
  const next = coerceState(btn.dataset.region, usMode);
  activeRegion = next.region;
  if (next.region === "us") usMode = next.mode;
  applyState();
});

document.getElementById("colorToggle").addEventListener("click", (e) => {
  const btn = e.target.closest("button");
  if (!btn || !btn.dataset.mode || !isUSView()) return;
  usMode = btn.dataset.mode;
  applyState();
});

window.addEventListener("resize", resize);

fetch("data.json")
  .then(r => r.json())
  .then(d => {
    payload = d;
    const url = new URL(window.location.href);
    const requestedRegion = url.searchParams.get("region") || payload.defaultRegion || "us";
    const requestedMode = url.searchParams.get("mode") || payload.views.us.defaultMode;
    const next = coerceState(requestedRegion, requestedMode);
    activeRegion = next.region;
    usMode = next.mode;
    applyState({ skipUrl: false });
  });
</script>
</body>
</html>
