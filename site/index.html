<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jobs Atlas</title>
<link rel="icon" href="data:,">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #f6f3ee;
  --bg2: #fffdfa;
  --fg: #17171c;
  --fg2: #696977;
  --fg3: #4b4b57;
}

body {
  background: var(--bg);
  color: var(--fg);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
}

a {
  color: var(--fg2);
}

[hidden] {
  display: none !important;
}

#wrapper {
  max-width: 1400px;
  width: 100%;
  margin: 0 auto;
  padding-bottom: 250px;
}

#header {
  padding: 20px 28px 16px;
}

.intro {
  margin-bottom: 18px;
}

.intro h1 {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
}

.intro h1 a {
  font-size: 13px;
  font-weight: 400;
  color: var(--fg2);
  text-decoration: none;
}

.intro h1 a:hover,
.intro a:hover {
  text-decoration: underline;
}

.meta-line {
  font-size: 12px;
  color: var(--fg2);
  margin-bottom: 12px;
}

#introCopy p {
  font-size: 15px;
  line-height: 1.6;
  color: var(--fg2);
  margin-bottom: 8px;
}

#introCopy strong,
#introCopy b {
  color: var(--fg);
  font-weight: 600;
}

.intro details {
  margin: 10px 0;
}

.intro summary {
  font-size: 14px;
  color: var(--fg2);
  cursor: pointer;
  user-select: none;
}

.intro summary:hover {
  color: var(--fg);
}

.prompt-box {
  margin-top: 8px;
  background: rgba(255,255,255,0.82);
  border: 1px solid rgba(23,23,28,0.1);
  border-radius: 6px;
  padding: 12px 16px;
  font-family: "SF Mono", "Menlo", "Consolas", monospace;
  font-size: 11px;
  line-height: 1.5;
  color: var(--fg2);
  max-height: 300px;
  overflow-y: auto;
  white-space: pre-wrap;
  word-break: break-word;
}

.controls-row {
  display: flex;
  align-items: flex-end;
  gap: 14px;
  flex-wrap: wrap;
  margin-bottom: 14px;
}

.control-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.control-group h3,
.stat-section h3 {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--fg2);
}

.geo-toggle,
.color-toggle {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

.geo-toggle button,
.color-toggle button {
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 500;
  border: 1px solid rgba(23,23,28,0.12);
  background: transparent;
  color: var(--fg2);
  cursor: pointer;
  transition: all 0.15s;
}

.geo-toggle button {
  border-radius: 999px;
}

.color-toggle button {
  border-radius: 4px;
}

.geo-toggle button.active,
.color-toggle button.active {
  background: rgba(23,23,28,0.08);
  color: var(--fg);
  border-color: rgba(23,23,28,0.2);
}

.geo-toggle button:hover:not(.active),
.color-toggle button:hover:not(.active) {
  background: rgba(23,23,28,0.04);
}

.mode-chip {
  padding: 8px 12px;
  border: 1px solid rgba(23,23,28,0.12);
  border-radius: 999px;
  background: rgba(23,23,28,0.03);
  font-size: 12px;
  color: var(--fg3);
}

.gradient-legend {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--fg2);
}

.gradient-legend canvas {
  border-radius: 2px;
}

.stats-row {
  display: flex;
  flex-wrap: wrap;
  gap: 20px 28px;
  align-items: flex-start;
  margin-bottom: 12px;
}

.stat-section {
  display: flex;
  flex-direction: column;
  gap: 5px;
  min-width: 130px;
}

.stat-big {
  font-size: 32px;
  font-weight: 700;
  letter-spacing: -0.03em;
  line-height: 1;
}

.stat-label {
  font-size: 11px;
  color: var(--fg2);
  max-width: 200px;
  line-height: 1.35;
}

.stat-note {
  font-size: 11px;
  color: var(--fg3);
  max-width: 220px;
  line-height: 1.35;
}

.mini-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 10px 18px;
  margin-bottom: 16px;
  font-size: 11px;
  color: var(--fg2);
  line-height: 1.4;
}

canvas#canvas {
  display: block;
  cursor: default;
}

#tooltip {
  position: fixed;
  pointer-events: none;
  background: var(--bg2);
  border: 1px solid rgba(23,23,28,0.12);
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 13px;
  line-height: 1.5;
  max-width: 360px;
  opacity: 0;
  transition: opacity 0.12s;
  z-index: 20;
  box-shadow: 0 18px 40px rgba(34, 31, 45, 0.14);
}

#tooltip.visible {
  opacity: 1;
}

#tooltip .tt-title {
  font-weight: 600;
  font-size: 14px;
  margin-bottom: 6px;
  color: var(--fg);
}

#tooltip .tt-highlight {
  font-size: 12px;
  margin-bottom: 8px;
}

#tooltip .tt-stats {
  display: grid;
  grid-template-columns: auto auto;
  gap: 2px 12px;
  font-size: 12px;
}

#tooltip .tt-stats .label {
  color: var(--fg2);
}

#tooltip .tt-stats .value {
  color: var(--fg);
  text-align: right;
}

#tooltip .tt-rationale,
#tooltip .tt-country-breakdown {
  margin-top: 8px;
  line-height: 1.4;
  border-top: 1px solid rgba(23,23,28,0.08);
  padding-top: 8px;
}

#tooltip .tt-rationale {
  font-size: 11px;
  color: var(--fg2);
}

#tooltip .tt-country-title {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--fg2);
  margin-bottom: 6px;
}

#tooltip .tt-country-row {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  font-size: 11px;
  color: var(--fg3);
}

@media (max-width: 900px) {
  #header { padding: 18px 18px 12px; }
  .intro h1 { font-size: 24px; }
  .controls-row, .stats-row { gap: 16px 18px; }
}

@media (max-width: 640px) {
  .intro h1 { font-size: 22px; }
  .stat-big { font-size: 28px; }
  #tooltip { max-width: min(340px, calc(100vw - 24px)); }
}
</style>
</head>
<body>

<div id="wrapper">
  <div id="header">
    <div class="intro">
      <h1><span id="pageTitle">Jobs Atlas</span> <a class="repo-link" href="https://github.com/bozliu/jobs">GitHub</a></h1>
      <div class="meta-line" id="regionMeta"></div>
      <div id="introCopy"></div>
      <details id="promptDetails" hidden>
        <summary>View the Digital AI Exposure scoring prompt</summary>
        <div class="prompt-box" id="promptBox"></div>
      </details>
    </div>

    <div class="controls-row">
      <div class="control-group">
        <h3>Region</h3>
        <div class="geo-toggle" id="regionToggle">
          <button data-region="us" class="active">US</button>
          <button data-region="asia">Asia</button>
          <button data-region="europe">Europe</button>
        </div>
      </div>

      <div class="control-group" id="modeSection">
        <h3>Layer</h3>
        <div class="color-toggle" id="colorToggle">
          <button data-mode="outlook" class="active">BLS Outlook</button>
          <button data-mode="pay">Median Pay</button>
          <button data-mode="education">Education</button>
          <button data-mode="exposure">Digital AI Exposure</button>
        </div>
        <div class="mode-chip" id="modeChip" hidden>Area = Employment · Color = Digital AI Exposure</div>
      </div>

      <div class="gradient-legend">
        <span id="legendLow">Declining</span>
        <canvas id="gradientLegend" width="80" height="8"></canvas>
        <span id="legendHigh">Growing</span>
      </div>
    </div>

    <div class="stats-row" id="statsRow"></div>
    <div class="mini-meta">
      <span id="footnoteLeft"></span>
      <span id="footnoteRight"></span>
    </div>
  </div>

  <canvas id="canvas"></canvas>
</div>

<div id="tooltip">
  <div class="tt-title"></div>
  <div class="tt-highlight"></div>
  <div class="tt-stats"></div>
  <div class="tt-rationale"></div>
  <div class="tt-country-breakdown"></div>
</div>

<script>
let payload = null;
let activeRegion = "us";
let usMode = "outlook";
let colorMode = "outlook";
let data = [];
let visibleData = [];
let rects = [];
let hovered = null;

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
let dpr = window.devicePixelRatio || 1;
const MARGIN = 12;
const GAP = 1.5;

const EDU_LEVELS = [
  "No formal educational credential",
  "High school diploma or equivalent",
  "Postsecondary nondegree award",
  "Some college, no degree",
  "Associate's degree",
  "Bachelor's degree",
  "Master's degree",
  "Doctoral or professional degree",
];

const LEGEND_CONFIG = {
  exposure:  { low: "Low", high: "High" },
  outlook:   { low: "Declining", high: "Growing" },
  pay:       { low: "$25K", high: "$250K" },
  education: { low: "No degree", high: "Doctoral" },
};

function currentView() {
  return payload.views[activeRegion];
}

function isUSView() {
  return activeRegion === "us";
}

function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, (char) => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#39;",
  }[char]));
}

function formatNumber(value) {
  if (value == null) return "—";
  if (value >= 1e9) return (value / 1e9).toFixed(1).replace(/\.0$/, "") + "B";
  if (value >= 1e6) return (value / 1e6).toFixed(1).replace(/\.0$/, "") + "M";
  if (value >= 1e3) return Math.round(value / 1e3) + "K";
  return value.toLocaleString();
}

function formatBigNumber(value) {
  if (value == null) return "—";
  if (value >= 1e9) return (value / 1e9).toFixed(2).replace(/0$/, "").replace(/\.$/, "") + "B";
  if (value >= 1e6) return (value / 1e6).toFixed(1).replace(/\.0$/, "") + "M";
  return value.toLocaleString();
}

function formatPay(value) {
  return value == null ? "—" : "$" + value.toLocaleString();
}

function weightedAverage(records, key) {
  let weighted = 0;
  let jobs = 0;
  for (const record of records) {
    const value = record[key];
    if (value == null || !record.jobs) continue;
    weighted += value * record.jobs;
    jobs += record.jobs;
  }
  return jobs ? weighted / jobs : null;
}

function boostContrast(t) {
  const c = (t - 0.5) * 2;
  const b = Math.sign(c) * Math.pow(Math.abs(c), 0.55);
  return b / 2 + 0.5;
}

function greenRedCSS(t, alpha) {
  t = boostContrast(Math.max(0, Math.min(1, t)));
  let r, g, b;
  if (t < 0.5) {
    const s = t / 0.5;
    r = Math.round(30 + s * 200);
    g = Math.round(180 - s * 20);
    b = Math.round(40 - s * 20);
  } else {
    const s = (t - 0.5) / 0.5;
    r = Math.round(230 + s * 25);
    g = Math.round(160 - s * 130);
    b = Math.round(20 - s * 5);
  }
  return `rgba(${r},${g},${b},${alpha})`;
}

function outlookColor(value, alpha) {
  if (value == null) return `rgba(128,128,128,${alpha})`;
  return greenRedCSS(1 - Math.max(0, Math.min(1, (value + 12) / 24)), alpha);
}

function payColor(value, alpha) {
  if (value == null) return `rgba(128,128,128,${alpha})`;
  const t = 1 - (Math.log(Math.max(25000, Math.min(250000, value))) - Math.log(25000)) / (Math.log(250000) - Math.log(25000));
  return greenRedCSS(t, alpha);
}

function eduColor(index, alpha) {
  if (index < 0) return `rgba(128,128,128,${alpha})`;
  return greenRedCSS(1 - index / (EDU_LEVELS.length - 1), alpha);
}

function exposureColor(value, alpha) {
  if (value == null) return `rgba(128,128,128,${alpha})`;
  return greenRedCSS(value / 10, alpha);
}

function tileColorCSS(record, alpha) {
  if (!isUSView()) return exposureColor(record.exposure, alpha);
  if (colorMode === "exposure") return exposureColor(record.exposure, alpha);
  if (colorMode === "outlook") return outlookColor(record.outlook, alpha);
  if (colorMode === "pay") return payColor(record.pay, alpha);
  if (colorMode === "education") return eduColor(EDU_LEVELS.indexOf(record.education), alpha);
  return `rgba(128,128,128,${alpha})`;
}

function tileSubInfo(record) {
  if (!isUSView()) {
    return (record.exposure != null ? record.exposure + "/10" : "") +
      (record.jobs ? " · " + formatNumber(record.jobs) + " jobs" : "");
  }
  if (colorMode === "exposure") {
    return (record.exposure != null ? record.exposure + "/10" : "") +
      (record.jobs ? " · " + formatNumber(record.jobs) + " jobs" : "");
  }
  if (colorMode === "outlook") {
    const outlook = record.outlook != null ? (record.outlook > 0 ? "+" : "") + record.outlook + "%" : "";
    return outlook + (record.jobs ? " · " + formatNumber(record.jobs) + " jobs" : "");
  }
  if (colorMode === "pay") {
    return (record.pay != null ? formatPay(record.pay) : "") +
      (record.jobs ? " · " + formatNumber(record.jobs) + " jobs" : "");
  }
  if (colorMode === "education") {
    const short = {
      "No formal educational credential": "No formal",
      "High school diploma or equivalent": "HS diploma",
      "Postsecondary nondegree award": "Postsecondary",
      "Some college, no degree": "Some college",
      "Associate's degree": "Associate's",
      "Bachelor's degree": "Bachelor's",
      "Master's degree": "Master's",
      "Doctoral or professional degree": "Doctoral/Prof",
    }[record.education] || "";
    return short + (record.jobs ? " · " + formatNumber(record.jobs) + " jobs" : "");
  }
  return "";
}

function squarify(items, x, y, w, h) {
  if (items.length === 0) return [];
  if (items.length === 1) return [{ ...items[0], rx: x, ry: y, rw: w, rh: h }];
  const total = items.reduce((sum, item) => sum + item.value, 0);
  if (total === 0) return [];
  const results = [];
  let remaining = [...items];
  let cx = x;
  let cy = y;
  let cw = w;
  let ch = h;

  while (remaining.length > 0) {
    const remTotal = remaining.reduce((sum, item) => sum + item.value, 0);
    const vertical = cw >= ch;
    const side = vertical ? ch : cw;
    let row = [remaining[0]];
    let rowSum = remaining[0].value;

    for (let i = 1; i < remaining.length; i++) {
      const candidate = [...row, remaining[i]];
      const candidateSum = rowSum + remaining[i].value;
      if (worstAspect(candidate, candidateSum, side, remTotal, vertical ? cw : ch) <
          worstAspect(row, rowSum, side, remTotal, vertical ? cw : ch)) {
        row = candidate;
        rowSum = candidateSum;
      } else {
        break;
      }
    }

    const rowFraction = rowSum / remTotal;
    const rowThickness = vertical ? cw * rowFraction : ch * rowFraction;
    let offset = 0;

    for (const item of row) {
      const itemFraction = item.value / rowSum;
      const itemLength = side * itemFraction;
      if (vertical) results.push({ ...item, rx: cx, ry: cy + offset, rw: rowThickness, rh: itemLength });
      else results.push({ ...item, rx: cx + offset, ry: cy, rw: itemLength, rh: rowThickness });
      offset += itemLength;
    }

    if (vertical) {
      cx += rowThickness;
      cw -= rowThickness;
    } else {
      cy += rowThickness;
      ch -= rowThickness;
    }

    remaining = remaining.slice(row.length);
  }

  return results;
}

function worstAspect(row, rowSum, side, totalArea, availableExtent) {
  const rowExtent = availableExtent * (rowSum / totalArea);
  if (rowExtent === 0) return Infinity;
  let worst = 0;
  for (const item of row) {
    const itemLength = side * (item.value / rowSum);
    if (itemLength === 0) continue;
    const aspect = Math.max(rowExtent / itemLength, itemLength / rowExtent);
    if (aspect > worst) worst = aspect;
  }
  return worst;
}

function layout() {
  const wrapper = document.getElementById("wrapper");
  const width = wrapper.clientWidth;
  const height = Math.round(width * 3 / 4);
  canvas.width = width * dpr;
  canvas.height = height * dpr;
  canvas.style.width = width + "px";
  canvas.style.height = height + "px";

  const tx = MARGIN;
  const ty = MARGIN;
  const tw = width - MARGIN * 2;
  const th = height - MARGIN * 2;

  const byCategory = {};
  for (const record of visibleData) {
    const category = record.category || "uncategorized";
    if (!byCategory[category]) byCategory[category] = [];
    byCategory[category].push(record);
  }

  const categories = Object.keys(byCategory).map((category) => ({
    cat: category,
    items: byCategory[category].sort((a, b) => (b.jobs || 0) - (a.jobs || 0)),
    value: byCategory[category].reduce((sum, record) => sum + (record.jobs || 1), 0),
  })).sort((a, b) => b.value - a.value);

  const categoryRects = squarify(categories, tx, ty, tw, th);
  rects = [];
  for (const categoryRect of categoryRects) {
    const items = categoryRect.items.map((record) => ({ ...record, value: record.jobs || 1 }));
    const innerRects = squarify(items, categoryRect.rx + GAP, categoryRect.ry + GAP, categoryRect.rw - GAP * 2, categoryRect.rh - GAP * 2);
    for (const rect of innerRects) rects.push(rect);
  }
}

function draw() {
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.fillStyle = "#f6f3ee";
  ctx.fillRect(0, 0, canvas.width / dpr, canvas.height / dpr);

  for (const record of rects) {
    const isHovered = record === hovered;
    const g = GAP / 2;
    const rx = record.rx + g;
    const ry = record.ry + g;
    const rw = record.rw - g * 2;
    const rh = record.rh - g * 2;
    if (rw <= 0 || rh <= 0) continue;

    ctx.fillStyle = tileColorCSS(record, isHovered ? 0.8 : 0.5);
    ctx.fillRect(rx, ry, rw, rh);

    if (isHovered) {
      ctx.strokeStyle = "rgba(23,23,28,0.78)";
      ctx.lineWidth = 2;
      ctx.strokeRect(rx, ry, rw, rh);
    }

    if (rw > 50 && rh > 18) {
      ctx.save();
      ctx.beginPath();
      ctx.rect(rx + 4, ry + 2, rw - 8, rh - 4);
      ctx.clip();
      const fontSize = Math.min(13, Math.max(9, Math.min(rw / 10, rh / 3)));
      ctx.font = `500 ${fontSize}px -apple-system, system-ui, sans-serif`;
      ctx.fillStyle = isHovered ? "rgba(23,23,28,0.96)" : "rgba(23,23,28,0.88)";
      ctx.textBaseline = "top";
      ctx.fillText(record.title, rx + 5, ry + 4);
      if (rh > 34 && rw > 60) {
        ctx.font = `400 ${Math.max(8, fontSize - 2)}px -apple-system, system-ui, sans-serif`;
        ctx.fillStyle = "rgba(23,23,28,0.58)";
        ctx.fillText(tileSubInfo(record), rx + 5, ry + 4 + fontSize + 2);
      }
      ctx.restore();
    }
  }
}

function hitTest(mx, my) {
  const bounds = canvas.getBoundingClientRect();
  const cx = mx - bounds.left;
  const cy = my - bounds.top;
  for (let i = rects.length - 1; i >= 0; i--) {
    const record = rects[i];
    if (cx >= record.rx && cx < record.rx + record.rw && cy >= record.ry && cy < record.ry + record.rh) {
      return record;
    }
  }
  return null;
}

function tooltipHighlight(record) {
  if (!isUSView() || colorMode === "exposure") {
    const exposure = record.exposure;
    if (exposure == null) return "";
    const color = exposureColor(exposure, 1);
    return `<span style="color:${color};font-weight:600;">Digital AI Exposure: ${exposure}/10</span>` +
      `<div style="margin-top:3px;height:4px;background:rgba(23,23,28,0.08);border-radius:2px;">` +
      `<div style="height:100%;width:${exposure * 10}%;background:${color};border-radius:2px;"></div></div>`;
  }
  if (colorMode === "outlook") {
    const outlook = record.outlook;
    if (outlook == null) return "";
    const color = outlookColor(outlook, 1);
    return `<span style="color:${color};font-weight:600;">Outlook: ${outlook > 0 ? "+" : ""}${outlook}%</span>` +
      (record.outlook_desc ? ` <span style="color:var(--fg2);">(${record.outlook_desc})</span>` : "") +
      `<div style="margin-top:3px;height:4px;background:rgba(23,23,28,0.08);border-radius:2px;">` +
      `<div style="height:100%;width:${Math.min(100, Math.max(0, (outlook + 10) / 30 * 100))}%;background:${color};border-radius:2px;"></div></div>`;
  }
  if (colorMode === "pay") {
    const pay = record.pay;
    if (pay == null) return "";
    const color = payColor(pay, 1);
    return `<span style="color:${color};font-weight:600;">Median Pay: ${formatPay(pay)}</span>` +
      `<div style="margin-top:3px;height:4px;background:rgba(23,23,28,0.08);border-radius:2px;">` +
      `<div style="height:100%;width:${Math.min(100, pay / 150000 * 100)}%;background:${color};border-radius:2px;"></div></div>`;
  }
  const education = record.education || "";
  const idx = EDU_LEVELS.indexOf(education);
  const color = idx >= 0 ? eduColor(idx, 1) : "var(--fg)";
  return `<span style="color:${color};font-weight:600;">Education: ${education || "—"}</span>`;
}

function renderCountryBreakdown(record) {
  if (!record.countryBreakdown || !record.countryBreakdown.length) return "";
  const total = record.countryBreakdown.reduce((sum, item) => sum + item.jobs, 0);
  const rows = record.countryBreakdown
    .slice()
    .sort((a, b) => b.jobs - a.jobs)
    .slice(0, 6)
    .map((item) => {
      const pct = total > 0 ? (item.jobs / total * 100).toFixed(0) : "0";
      return `<div class="tt-country-row"><span>${escapeHtml(item.country)}</span><span>${formatBigNumber(item.jobs)} · ${pct}% · ${item.sourceYear}</span></div>`;
    })
    .join("");
  return `<div class="tt-country-title">Country mix</div>${rows}`;
}

function showTooltip(record, mx, my) {
  const tooltip = document.getElementById("tooltip");
  tooltip.querySelector(".tt-title").textContent = record.title;
  tooltip.querySelector(".tt-highlight").innerHTML = tooltipHighlight(record);

  if (isUSView()) {
    tooltip.querySelector(".tt-stats").innerHTML = `
      <span class="label">Median pay</span><span class="value">${formatPay(record.pay)}</span>
      <span class="label">Jobs (2024)</span><span class="value">${formatNumber(record.jobs)}</span>
      <span class="label">Outlook</span><span class="value">${record.outlook != null ? record.outlook + "%" : "—"} ${record.outlook_desc ? "(" + record.outlook_desc + ")" : ""}</span>
      <span class="label">Education</span><span class="value">${escapeHtml(record.education || "—")}</span>`;
    tooltip.querySelector(".tt-rationale").textContent = colorMode === "exposure" ? (record.exposure_rationale || "") : "";
    tooltip.querySelector(".tt-country-breakdown").innerHTML = "";
  } else {
    tooltip.querySelector(".tt-stats").innerHTML = `
      <span class="label">Regional jobs</span><span class="value">${formatBigNumber(record.jobs)}</span>
      <span class="label">AI exposure</span><span class="value">${record.exposure != null ? record.exposure + "/10" : "—"}</span>
      <span class="label">Mapping</span><span class="value">${escapeHtml(record.mappingType || "—")}${record.mappingConfidence != null ? " · " + record.mappingConfidence.toFixed(2) : ""}</span>
      <span class="label">Source years</span><span class="value">${escapeHtml(record.sourceYearLabel || "—")}</span>`;
    tooltip.querySelector(".tt-rationale").textContent = record.exposure_rationale || "";
    tooltip.querySelector(".tt-country-breakdown").innerHTML = renderCountryBreakdown(record);
  }

  let tx = mx + 16;
  let ty = my - 16;
  if (tx + 360 > window.innerWidth) tx = mx - 376;
  if (ty < 10) ty = my + 16;
  if (ty + 220 > window.innerHeight) ty = my - 220;
  tooltip.style.left = tx + "px";
  tooltip.style.top = ty + "px";
  tooltip.classList.add("visible");
}

function hideTooltip() {
  document.getElementById("tooltip").classList.remove("visible");
}

function buildStats(view) {
  const summary = view.summary;

  if (!isUSView()) {
    return [
      {
        label: "Mapped jobs",
        value: formatBigNumber(summary.totalJobs),
        context: `${summary.countriesCount} countries`,
        detail: `${summary.visibleOccupationsCount} visible occupations`,
      },
      {
        label: "Avg. exposure",
        value: summary.weightedAverageExposure != null ? summary.weightedAverageExposure.toFixed(1) : "—",
        context: "job-weighted",
        detail: "US canonical exposure scores",
      },
      {
        label: "Largest category",
        value: summary.largestCategory ? formatBigNumber(summary.largestCategory.jobs) : "—",
        context: summary.largestCategory ? summary.largestCategory.label : "—",
        detail: summary.largestCategory ? `${summary.largestCategory.shareOfJobs}% of mapped jobs` : "",
      },
      {
        label: "Largest country input",
        value: summary.topCountry ? formatBigNumber(summary.topCountry.jobs) : "—",
        context: summary.topCountry ? summary.topCountry.name : "—",
        detail: summary.topCountry ? `Source year ${summary.topCountry.sourceYear}` : "",
      },
      {
        label: "Freshness",
        value: summary.yearStrategy === "latest_shared" ? summary.yearLabel : "Mixed",
        context: summary.freshnessSummary,
        detail: summary.note,
      },
    ];
  }

  const stats = [
    {
      label: "Total jobs",
      value: formatBigNumber(summary.totalJobs),
      context: `${summary.occupationsCount} occupations`,
      detail: "BLS 2024 occupational employment",
    },
  ];

  if (colorMode === "outlook") {
    const avgOutlook = weightedAverage(data, "outlook");
    const growingJobs = data.reduce((sum, item) => sum + ((item.outlook != null && item.outlook > 0 && item.jobs) ? item.jobs : 0), 0);
    stats.push(
      {
        label: "Avg. outlook",
        value: avgOutlook != null ? `${avgOutlook > 0 ? "+" : ""}${avgOutlook.toFixed(1)}%` : "—",
        context: "job-weighted",
        detail: "projected growth",
      },
      {
        label: "Fastest growth",
        value: summary.fastestGrowingOccupation ? `${summary.fastestGrowingOccupation.outlook > 0 ? "+" : ""}${summary.fastestGrowingOccupation.outlook}%` : "—",
        context: summary.fastestGrowingOccupation ? summary.fastestGrowingOccupation.title : "—",
        detail: "highest BLS projection",
      },
      {
        label: "Growing jobs",
        value: formatBigNumber(growingJobs),
        context: "positive outlook",
        detail: "jobs above 0%",
      },
      {
        label: "Largest category",
        value: summary.highlights && summary.highlights[0] ? formatBigNumber(summary.highlights[0].value) : "—",
        context: summary.highlights && summary.highlights[0] ? summary.highlights[0].context : "—",
        detail: summary.highlights && summary.highlights[0] ? summary.highlights[0].detail : "",
      },
    );
  } else if (colorMode === "pay") {
    const totalWages = data.reduce((sum, item) => sum + ((item.jobs && item.pay) ? item.jobs * item.pay : 0), 0);
    const topPayCategory = currentView().categories
      .filter((category) => category.averagePay != null)
      .sort((a, b) => b.averagePay - a.averagePay)[0];
    stats.push(
      {
        label: "Avg. pay",
        value: summary.weightedAveragePay != null ? "$" + Math.round(summary.weightedAveragePay / 1000) + "K" : "—",
        context: "job-weighted",
        detail: "median annual pay",
      },
      {
        label: "Highest pay",
        value: summary.highestPayOccupation ? formatPay(summary.highestPayOccupation.pay) : "—",
        context: summary.highestPayOccupation ? summary.highestPayOccupation.title : "—",
        detail: "top annual median pay",
      },
      {
        label: "Annual wage pool",
        value: "$" + (totalWages / 1e12).toFixed(1) + "T",
        context: "jobs × median pay",
        detail: "rough scale check",
      },
      {
        label: "Top pay category",
        value: topPayCategory ? "$" + Math.round(topPayCategory.averagePay / 1000) + "K" : "—",
        context: topPayCategory ? topPayCategory.label : "—",
        detail: "weighted by employment",
      },
    );
  } else if (colorMode === "education") {
    const bachelorsPlus = data.reduce((sum, item) => sum + ((item.jobs && ["Bachelor's degree", "Master's degree", "Doctoral or professional degree"].includes(item.education)) ? item.jobs : 0), 0);
    const noDegree = data.reduce((sum, item) => sum + ((item.jobs && ["No formal educational credential", "High school diploma or equivalent"].includes(item.education)) ? item.jobs : 0), 0);
    const educationJobs = {};
    for (const item of data) {
      if (!item.education || !item.jobs) continue;
      educationJobs[item.education] = (educationJobs[item.education] || 0) + item.jobs;
    }
    const dominantEducation = Object.entries(educationJobs).sort((a, b) => b[1] - a[1])[0];
    stats.push(
      {
        label: "Bachelor's+",
        value: summary.totalJobs ? `${Math.round((bachelorsPlus / summary.totalJobs) * 100)}%` : "—",
        context: "of all jobs",
        detail: "require at least a bachelor's degree",
      },
      {
        label: "No degree / HS",
        value: formatBigNumber(noDegree),
        context: "lower formal credential floor",
        detail: "jobs without bachelor's entry",
      },
      {
        label: "Most common requirement",
        value: dominantEducation ? dominantEducation[0] : "—",
        context: dominantEducation ? formatBigNumber(dominantEducation[1]) + " jobs" : "—",
        detail: "weighted by employment",
      },
      {
        label: "Largest category",
        value: summary.highlights && summary.highlights[0] ? formatBigNumber(summary.highlights[0].value) : "—",
        context: summary.highlights && summary.highlights[0] ? summary.highlights[0].context : "—",
        detail: summary.highlights && summary.highlights[0] ? summary.highlights[0].detail : "",
      },
    );
  } else {
    const exposedCategory = currentView().categories
      .filter((category) => category.averageExposure != null && category.jobs >= 500000)
      .sort((a, b) => b.averageExposure - a.averageExposure)[0];
    stats.push(
      {
        label: "Avg. exposure",
        value: summary.weightedAverageExposure != null ? summary.weightedAverageExposure.toFixed(1) : "—",
        context: "job-weighted",
        detail: "0-10 scale",
      },
      {
        label: "Most exposed at scale",
        value: summary.mostExposedLargeOccupation ? `${summary.mostExposedLargeOccupation.exposure}/10` : "—",
        context: summary.mostExposedLargeOccupation ? summary.mostExposedLargeOccupation.title : "—",
        detail: "large occupation",
      },
      {
        label: "Most resilient at scale",
        value: summary.mostResilientLargeOccupation ? `${summary.mostResilientLargeOccupation.exposure}/10` : "—",
        context: summary.mostResilientLargeOccupation ? summary.mostResilientLargeOccupation.title : "—",
        detail: "large occupation",
      },
      {
        label: "Most exposed category",
        value: exposedCategory ? exposedCategory.averageExposure.toFixed(1) : "—",
        context: exposedCategory ? exposedCategory.label : "—",
        detail: "average exposure weighted by jobs",
      },
    );
  }

  return stats;
}

function renderStatsRow() {
  const stats = buildStats(currentView());
  document.getElementById("statsRow").innerHTML = stats.map((stat) => `
    <div class="stat-section">
      <h3>${escapeHtml(stat.label)}</h3>
      <div class="stat-big">${escapeHtml(stat.value)}</div>
      <div class="stat-label">${escapeHtml(stat.context || "")}</div>
      <div class="stat-note">${escapeHtml(stat.detail || "")}</div>
    </div>
  `).join("");
}

function drawGradientLegend() {
  const legend = document.getElementById("gradientLegend");
  const legendCtx = legend.getContext("2d");
  const mode = isUSView() ? colorMode : "exposure";
  for (let x = 0; x < legend.width; x++) {
    const t = x / (legend.width - 1);
    if (mode === "outlook") legendCtx.fillStyle = greenRedCSS(1 - t, 1);
    else if (mode === "pay") legendCtx.fillStyle = greenRedCSS(1 - t, 1);
    else if (mode === "education") legendCtx.fillStyle = greenRedCSS(1 - t, 1);
    else legendCtx.fillStyle = greenRedCSS(t, 1);
    legendCtx.fillRect(x, 0, 1, legend.height);
  }
  const config = LEGEND_CONFIG[mode];
  document.getElementById("legendLow").textContent = config.low;
  document.getElementById("legendHigh").textContent = config.high;
}

function applyPayloadMetadata() {
  const view = currentView();
  const summary = view.summary;
  document.getElementById("pageTitle").textContent = view.heading;
  document.title = `${view.heading} | Jobs Atlas`;

  const countries = Array.isArray(view.countries) ? view.countries.join(", ") : "";
  document.getElementById("regionMeta").textContent = isUSView()
    ? `${countries} · BLS 2024 · ${summary.occupationsCount} occupations`
    : `${countries} · ${summary.sourceLabel} · ${summary.yearStrategy === "latest_shared" ? "shared year " + summary.yearLabel : summary.yearLabel} · ${summary.visibleOccupationsCount} visible tiles`;

  document.getElementById("introCopy").innerHTML = (summary.introHtml || []).map((paragraph) => `<p>${paragraph}</p>`).join("");
  document.querySelectorAll(".repo-link").forEach((link) => {
    link.href = summary.repoUrl;
  });

  const promptDetails = document.getElementById("promptDetails");
  const promptBox = document.getElementById("promptBox");
  promptDetails.hidden = !summary.showPrompt;
  promptBox.textContent = summary.promptText || "";

  document.getElementById("footnoteLeft").textContent = isUSView()
    ? "Area = employment. Click any tile to open the full BLS page."
    : `${summary.freshnessSummary}. Area = mapped employment, color = Digital AI Exposure.`;
  document.getElementById("footnoteRight").textContent = payload.generatedAt
    ? `Updated ${new Date(payload.generatedAt).toLocaleString()}`
    : "";
}

function updateModeControls() {
  document.getElementById("colorToggle").hidden = !isUSView();
  document.getElementById("modeChip").hidden = isUSView();
  document.querySelectorAll("#regionToggle button").forEach((button) => {
    button.classList.toggle("active", button.dataset.region === activeRegion);
  });
  document.querySelectorAll("#colorToggle button").forEach((button) => {
    button.classList.toggle("active", button.dataset.mode === colorMode);
  });
}

function coerceState(region, mode) {
  const safeRegion = payload.views[region] ? region : (payload.defaultRegion || "us");
  if (safeRegion !== "us") {
    return { region: safeRegion, mode: "exposure" };
  }
  const allowed = new Set(payload.views.us.availableModes || ["outlook"]);
  return {
    region: safeRegion,
    mode: allowed.has(mode) ? mode : payload.views.us.defaultMode,
  };
}

function syncUrl() {
  const url = new URL(window.location.href);
  url.searchParams.set("region", activeRegion);
  if (activeRegion === "us") url.searchParams.set("mode", usMode);
  else url.searchParams.delete("mode");
  window.history.replaceState({}, "", url);
}

function applyState({ skipUrl = false } = {}) {
  const view = currentView();
  colorMode = isUSView() ? usMode : view.defaultMode;
  data = view.occupations || [];
  visibleData = isUSView() ? data : data.filter((item) => (item.jobs || 0) > 0);
  applyPayloadMetadata();
  updateModeControls();
  renderStatsRow();
  drawGradientLegend();
  resize();
  if (!skipUrl) syncUrl();
}

function resize() {
  dpr = window.devicePixelRatio || 1;
  layout();
  draw();
}

canvas.addEventListener("mousemove", (event) => {
  const hit = hitTest(event.clientX, event.clientY);
  if (hit !== hovered) {
    hovered = hit;
    draw();
  }
  if (hovered) {
    showTooltip(hovered, event.clientX, event.clientY);
    canvas.style.cursor = isUSView() && hovered.url ? "pointer" : "default";
  } else {
    hideTooltip();
    canvas.style.cursor = "default";
  }
});

canvas.addEventListener("click", (event) => {
  const hit = hitTest(event.clientX, event.clientY);
  if (isUSView() && hit && hit.url) window.open(hit.url, "_blank");
});

canvas.addEventListener("mouseleave", () => {
  hovered = null;
  hideTooltip();
  draw();
});

document.getElementById("regionToggle").addEventListener("click", (event) => {
  const button = event.target.closest("button");
  if (!button || !button.dataset.region) return;
  const next = coerceState(button.dataset.region, usMode);
  activeRegion = next.region;
  if (next.region === "us") usMode = next.mode;
  applyState();
});

document.getElementById("colorToggle").addEventListener("click", (event) => {
  const button = event.target.closest("button");
  if (!button || !button.dataset.mode || !isUSView()) return;
  usMode = button.dataset.mode;
  applyState();
});

window.addEventListener("resize", resize);

fetch("data.json")
  .then((response) => response.json())
  .then((dataPayload) => {
    payload = dataPayload;
    const url = new URL(window.location.href);
    const requestedRegion = url.searchParams.get("region") || payload.defaultRegion || "us";
    const requestedMode = url.searchParams.get("mode") || payload.views.us.defaultMode;
    const next = coerceState(requestedRegion, requestedMode);
    activeRegion = next.region;
    usMode = next.mode;
    applyState();
  });
</script>
</body>
</html>
