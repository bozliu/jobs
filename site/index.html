<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Market Visualizer</title>
<link rel="icon" href="data:,">
<style>
*, *::before, *::after { box-sizing: border-box; }

:root {
  --paper: #f4ecdf;
  --paper-2: #fbf7ef;
  --paper-3: #fffdf9;
  --ink: #201b17;
  --ink-2: #554d45;
  --ink-3: #7d7469;
  --line: rgba(55, 43, 27, 0.12);
  --line-strong: rgba(55, 43, 27, 0.18);
  --shadow: 0 24px 80px rgba(70, 55, 33, 0.12);
  --shadow-soft: 0 10px 32px rgba(70, 55, 33, 0.08);
  --accent: #1d695f;
  --accent-soft: rgba(29, 105, 95, 0.08);
  --radius-xl: 28px;
  --radius-lg: 22px;
  --radius-md: 16px;
  --radius-sm: 12px;
}

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  min-height: 100vh;
  color: var(--ink);
  background:
    radial-gradient(circle at top left, rgba(202, 182, 143, 0.2), transparent 36%),
    radial-gradient(circle at top right, rgba(157, 184, 177, 0.16), transparent 28%),
    linear-gradient(180deg, #f6efe3 0%, #fbf8f2 58%, #f3ece1 100%);
  font-family: "Avenir Next", "Helvetica Neue", "Segoe UI", sans-serif;
}

a {
  color: var(--accent);
  text-decoration: none;
}

a:hover {
  text-decoration: underline;
}

button {
  font: inherit;
}

[hidden] {
  display: none !important;
}

.page {
  width: min(1500px, calc(100vw - 28px));
  margin: 20px auto 32px;
}

.hero {
  position: relative;
  overflow: hidden;
  padding: 28px;
  border-radius: var(--radius-xl);
  border: 1px solid var(--line);
  background:
    linear-gradient(135deg, rgba(255, 255, 255, 0.82), rgba(255, 249, 240, 0.9)),
    linear-gradient(180deg, rgba(255, 255, 255, 0.4), rgba(255, 255, 255, 0));
  box-shadow: var(--shadow);
}

.hero::before {
  content: "";
  position: absolute;
  inset: -10% auto auto -6%;
  width: 280px;
  height: 280px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(180, 202, 195, 0.22), transparent 70%);
  pointer-events: none;
}

.hero::after {
  content: "";
  position: absolute;
  inset: auto -8% -18% auto;
  width: 360px;
  height: 360px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(209, 174, 120, 0.16), transparent 68%);
  pointer-events: none;
}

.eyebrow {
  margin: 0 0 10px;
  font-size: 12px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-3);
}

.hero-grid {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: minmax(0, 1.7fr) minmax(320px, 0.95fr);
  gap: 28px;
}

.title-row {
  display: flex;
  align-items: baseline;
  gap: 14px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}

.title-row h1,
.canvas-header h2 {
  margin: 0;
  font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
  font-weight: 600;
  letter-spacing: -0.04em;
  line-height: 0.96;
}

.title-row h1 {
  font-size: clamp(2.8rem, 4.7vw, 5.2rem);
  max-width: 10ch;
}

.hero .repo-link {
  font-size: 13px;
  color: var(--ink-3);
}

.meta-line {
  margin-bottom: 14px;
  font-size: 13px;
  line-height: 1.5;
  color: var(--ink-3);
}

.intro-copy p {
  margin: 0 0 12px;
  max-width: 68ch;
  color: var(--ink-2);
  font-size: 15px;
  line-height: 1.72;
}

.intro-copy strong,
.intro-copy b {
  color: var(--ink);
  font-weight: 600;
}

.prompt-wrap {
  position: relative;
  z-index: 1;
  margin-top: 18px;
}

.prompt-wrap summary {
  cursor: pointer;
  color: var(--ink-3);
  font-size: 14px;
}

.prompt-wrap summary:hover {
  color: var(--ink);
}

.prompt-box {
  margin-top: 10px;
  padding: 14px 16px;
  border-radius: var(--radius-md);
  border: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.5);
  color: var(--ink-2);
  font-family: "SF Mono", "Menlo", "Consolas", monospace;
  font-size: 11px;
  line-height: 1.6;
  white-space: pre-wrap;
  max-height: 320px;
  overflow: auto;
}

.control-panel {
  display: grid;
  gap: 14px;
  align-content: start;
}

.panel-card,
.stat-card,
.canvas-shell {
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.76), rgba(255, 252, 247, 0.96));
  box-shadow: var(--shadow-soft);
}

.panel-card {
  padding: 16px;
}

.panel-label {
  margin: 0 0 10px;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-3);
}

.segmented {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.segmented button,
.mode-chip {
  padding: 10px 14px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.7);
  color: var(--ink-2);
  transition: background 0.18s ease, color 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
}

.segmented button {
  cursor: pointer;
}

.segmented button:hover,
.mode-chip:hover {
  border-color: var(--line-strong);
  transform: translateY(-1px);
}

.segmented button.active {
  background: var(--accent);
  border-color: transparent;
  color: #f8f4ed;
}

.legend-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 10px;
}

.legend-title {
  font-size: 15px;
  color: var(--ink);
}

.legend-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 12px;
  color: var(--ink-3);
}

.legend-bar canvas {
  flex: 1;
  min-width: 120px;
  height: 10px;
  border-radius: 999px;
}

.legend-note {
  margin: 10px 0 0;
  font-size: 12px;
  line-height: 1.5;
  color: var(--ink-3);
}

.stats-grid {
  margin-top: 20px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
  gap: 14px;
}

.stat-card {
  padding: 18px 18px 20px;
}

.stat-card .label {
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-3);
}

.stat-card .value {
  margin-top: 12px;
  font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
  font-size: clamp(2rem, 3vw, 3rem);
  letter-spacing: -0.05em;
  line-height: 0.94;
}

.stat-card .context {
  margin-top: 10px;
  font-size: 14px;
  color: var(--ink);
}

.stat-card .detail {
  margin-top: 6px;
  font-size: 12px;
  line-height: 1.5;
  color: var(--ink-3);
}

.canvas-shell {
  margin-top: 20px;
  padding: 20px;
}

.canvas-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 18px;
}

.canvas-header h2 {
  font-size: clamp(2rem, 3.2vw, 3.2rem);
  margin-top: 4px;
}

.canvas-meta {
  margin: 10px 0 0;
  max-width: 72ch;
  font-size: 14px;
  line-height: 1.6;
  color: var(--ink-2);
}

.canvas-summary {
  display: flex;
  flex-wrap: wrap;
  justify-content: flex-end;
  gap: 8px;
}

.summary-chip,
.footer-pill {
  padding: 8px 12px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.72);
  color: var(--ink-2);
  font-size: 12px;
}

#canvasFrame {
  position: relative;
  overflow: hidden;
  border-radius: calc(var(--radius-lg) - 4px);
  border: 1px solid var(--line);
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.7), rgba(252, 248, 240, 0.92)),
    linear-gradient(135deg, rgba(192, 213, 205, 0.08), rgba(214, 182, 126, 0.08));
}

canvas#canvas {
  display: block;
  width: 100%;
  cursor: default;
}

.canvas-footer {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 14px;
}

#tooltip {
  position: fixed;
  z-index: 20;
  max-width: 360px;
  padding: 14px 16px;
  border-radius: 18px;
  border: 1px solid rgba(48, 39, 29, 0.14);
  background: rgba(255, 253, 249, 0.96);
  box-shadow: 0 24px 48px rgba(57, 46, 31, 0.16);
  color: var(--ink);
  pointer-events: none;
  opacity: 0;
  transform: translateY(6px);
  transition: opacity 0.12s ease, transform 0.12s ease;
  backdrop-filter: blur(10px);
}

#tooltip.visible {
  opacity: 1;
  transform: translateY(0);
}

#tooltip .tt-title {
  font-size: 17px;
  font-weight: 600;
  line-height: 1.28;
}

#tooltip .tt-highlight {
  margin-top: 10px;
}

#tooltip .tt-stats {
  display: grid;
  grid-template-columns: auto auto;
  gap: 4px 14px;
  margin-top: 12px;
  font-size: 12px;
}

#tooltip .tt-stats .label {
  color: var(--ink-3);
}

#tooltip .tt-stats .value {
  text-align: right;
  color: var(--ink);
}

#tooltip .tt-rationale,
#tooltip .tt-country-breakdown {
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--line);
}

#tooltip .tt-rationale {
  font-size: 12px;
  line-height: 1.55;
  color: var(--ink-2);
}

#tooltip .tt-country-title {
  margin-bottom: 6px;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-3);
}

#tooltip .tt-country-row {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  font-size: 11px;
  line-height: 1.5;
  color: var(--ink-2);
}

@media (max-width: 1080px) {
  .hero-grid {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 720px) {
  .page {
    width: min(100vw - 18px, 1500px);
    margin: 10px auto 24px;
  }

  .hero,
  .canvas-shell {
    padding: 18px;
  }

  .title-row h1 {
    font-size: 2.7rem;
  }

  .canvas-header {
    flex-direction: column;
  }

  .canvas-summary {
    justify-content: flex-start;
  }

  #tooltip {
    max-width: min(340px, calc(100vw - 20px));
  }
}

@media (prefers-reduced-motion: reduce) {
  html {
    scroll-behavior: auto;
  }

  * {
    transition: none !important;
  }
}
</style>
</head>
<body>
<div class="page">
  <header class="hero">
    <div class="hero-grid">
      <div>
        <p class="eyebrow">Global Labor Atlas</p>
        <div class="title-row">
          <h1 id="pageTitle">Job Market Visualizer</h1>
          <a class="repo-link" href="https://github.com/bozliu/jobs">GitHub</a>
        </div>
        <div class="meta-line" id="regionMeta"></div>
        <div class="intro-copy" id="introCopy"></div>
      </div>

      <div class="control-panel">
        <div class="panel-card">
          <p class="panel-label">Region</p>
          <div class="segmented" id="regionToggle">
            <button data-region="us" class="active">US</button>
            <button data-region="asia">Asia</button>
            <button data-region="europe">Europe</button>
          </div>
        </div>

        <div class="panel-card" id="modeSection">
          <p class="panel-label">Layer</p>
          <div class="segmented" id="colorToggle">
            <button data-mode="outlook" class="active">BLS Outlook</button>
            <button data-mode="pay">Median Pay</button>
            <button data-mode="education">Education</button>
            <button data-mode="exposure">Digital AI Exposure</button>
          </div>
          <div class="mode-chip" id="modeChip" hidden>Area = Employment · Color = Digital AI Exposure</div>
        </div>

        <div class="panel-card">
          <div class="legend-head">
            <p class="panel-label" style="margin:0;">Color Legend</p>
            <span class="legend-title" id="legendTitle">BLS outlook</span>
          </div>
          <div class="legend-bar">
            <span id="legendLow">Declining</span>
            <canvas id="gradientLegend" width="160" height="10" aria-hidden="true"></canvas>
            <span id="legendHigh">Growing</span>
          </div>
          <p class="legend-note" id="legendNote"></p>
        </div>
      </div>
    </div>

    <details class="prompt-wrap" id="promptDetails" hidden>
      <summary>View the Digital AI Exposure scoring prompt</summary>
      <div class="prompt-box" id="promptBox"></div>
    </details>
  </header>

  <section class="stats-grid" id="statsGrid"></section>

  <section class="canvas-shell">
    <div class="canvas-header">
      <div>
        <p class="eyebrow">Treemap Explorer</p>
        <h2 id="canvasTitle">Occupation map</h2>
        <p class="canvas-meta" id="canvasMeta"></p>
      </div>
      <div class="canvas-summary">
        <span class="summary-chip" id="summaryChip1"></span>
        <span class="summary-chip" id="summaryChip2"></span>
        <span class="summary-chip" id="summaryChip3"></span>
      </div>
    </div>

    <div id="canvasFrame">
      <canvas id="canvas"></canvas>
    </div>

    <div class="canvas-footer">
      <span class="footer-pill" id="footerMethod"></span>
      <span class="footer-pill" id="footerFreshness"></span>
      <span class="footer-pill" id="footerUpdated"></span>
    </div>
  </section>
</div>

<div id="tooltip">
  <div class="tt-title"></div>
  <div class="tt-highlight"></div>
  <div class="tt-stats"></div>
  <div class="tt-rationale"></div>
  <div class="tt-country-breakdown"></div>
</div>

<script>
let payload = null;
let activeRegion = "us";
let usMode = "outlook";
let colorMode = "outlook";
let data = [];
let visibleData = [];
let rects = [];
let categoryRects = [];
let hovered = null;

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
let dpr = window.devicePixelRatio || 1;

const MARGIN = 16;
const GAP = 2;
const PAPER = "#fbf7ef";
const PAPER_ALT = "#f6efe3";
const INK = "#201b17";
const INK_SOFT = "#7d7469";
const GRID = "rgba(60, 47, 31, 0.1)";
const GRID_STRONG = "rgba(60, 47, 31, 0.16)";
const LIGHT_LABEL = "rgba(255, 251, 244, 0.96)";

const EDU_LEVELS = [
  "No formal educational credential",
  "High school diploma or equivalent",
  "Postsecondary nondegree award",
  "Some college, no degree",
  "Associate's degree",
  "Bachelor's degree",
  "Master's degree",
  "Doctoral or professional degree",
];

const COLOR_SCALES = {
  exposure: { low: [202, 214, 206], high: [153, 81, 52] },
  outlook: { low: [171, 85, 66], high: [58, 124, 95] },
  pay: { low: [224, 214, 192], high: [40, 82, 116] },
  education: { low: [220, 211, 194], high: [95, 88, 151] },
  neutral: [189, 178, 162],
};

const LEGEND_CONFIG = {
  exposure: {
    title: "Digital AI exposure",
    low: "Lower",
    high: "Higher",
    note: "Screen-native work trends warmer and more saturated.",
  },
  outlook: {
    title: "BLS outlook",
    low: "Declining",
    high: "Growing",
    note: "Warmer tiles are slower or negative growth; greener tiles point to faster expansion.",
  },
  pay: {
    title: "Median pay",
    low: "$25K",
    high: "$250K",
    note: "Darker blue tiles mark occupations with higher median annual pay.",
  },
  education: {
    title: "Entry education",
    low: "No degree",
    high: "Doctoral",
    note: "Higher entry credentials shift tiles toward deeper indigo.",
  },
};

function currentView() {
  return payload.views[activeRegion];
}

function isUSView() {
  return activeRegion === "us";
}

function clamp(value, min = 0, max = 1) {
  return Math.max(min, Math.min(max, value));
}

function mixColor(low, high, t) {
  return low.map((channel, index) => Math.round(channel + (high[index] - channel) * t));
}

function rgba(rgb, alpha = 1) {
  return `rgba(${rgb[0]}, ${rgb[1]}, ${rgb[2]}, ${alpha})`;
}

function luminance(rgb) {
  return rgb[0] * 0.299 + rgb[1] * 0.587 + rgb[2] * 0.114;
}

function neutralColor(alpha = 1) {
  return rgba(COLOR_SCALES.neutral, alpha);
}

function outlookRGB(value) {
  if (value == null) return COLOR_SCALES.neutral;
  const t = clamp((value + 12) / 24);
  return mixColor(COLOR_SCALES.outlook.low, COLOR_SCALES.outlook.high, t);
}

function payRGB(value) {
  if (value == null) return COLOR_SCALES.neutral;
  const bounded = Math.max(25000, Math.min(250000, value));
  const t = clamp((Math.log(bounded) - Math.log(25000)) / (Math.log(250000) - Math.log(25000)));
  return mixColor(COLOR_SCALES.pay.low, COLOR_SCALES.pay.high, t);
}

function educationRGB(value) {
  const idx = EDU_LEVELS.indexOf(value);
  if (idx < 0) return COLOR_SCALES.neutral;
  const t = clamp(idx / (EDU_LEVELS.length - 1));
  return mixColor(COLOR_SCALES.education.low, COLOR_SCALES.education.high, t);
}

function exposureRGB(value) {
  if (value == null) return COLOR_SCALES.neutral;
  const t = clamp(value / 10);
  return mixColor(COLOR_SCALES.exposure.low, COLOR_SCALES.exposure.high, t);
}

function tileRGB(record) {
  if (!isUSView()) return exposureRGB(record.exposure);
  if (colorMode === "outlook") return outlookRGB(record.outlook);
  if (colorMode === "pay") return payRGB(record.pay);
  if (colorMode === "education") return educationRGB(record.education);
  return exposureRGB(record.exposure);
}

function formatNumber(value) {
  if (value == null) return "—";
  if (value >= 1e9) return (value / 1e9).toFixed(1).replace(/\.0$/, "") + "B";
  if (value >= 1e6) return (value / 1e6).toFixed(1).replace(/\.0$/, "") + "M";
  if (value >= 1e3) return Math.round(value / 1e3) + "K";
  return value.toLocaleString();
}

function formatBigNumber(value) {
  if (value == null) return "—";
  if (value >= 1e9) return (value / 1e9).toFixed(2).replace(/0$/, "").replace(/\.$/, "") + "B";
  if (value >= 1e6) return (value / 1e6).toFixed(1).replace(/\.0$/, "") + "M";
  return value.toLocaleString();
}

function formatPay(value) {
  return value == null ? "—" : "$" + value.toLocaleString();
}

function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, (char) => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#39;",
  }[char]));
}

function metricModeLabel() {
  if (!isUSView()) return "Digital AI Exposure";
  return {
    outlook: "BLS Outlook",
    pay: "Median Pay",
    education: "Education",
    exposure: "Digital AI Exposure",
  }[colorMode] || "BLS Outlook";
}

function categoryLabel(slug) {
  const record = data.find((item) => item.category === slug);
  return record ? record.category_label : slug.replace(/-/g, " ");
}

function tileSubInfo(record) {
  const jobs = record.jobs ? `${formatNumber(record.jobs)} jobs` : "";
  if (!isUSView()) {
    return `${record.exposure != null ? record.exposure + "/10" : "—"} · ${jobs}`;
  }
  if (colorMode === "outlook") {
    const outlook = record.outlook != null ? `${record.outlook > 0 ? "+" : ""}${record.outlook}%` : "—";
    return `${outlook} · ${jobs}`;
  }
  if (colorMode === "pay") {
    return `${formatPay(record.pay)} · ${jobs}`;
  }
  if (colorMode === "education") {
    return `${record.education || "—"} · ${jobs}`;
  }
  return `${record.exposure != null ? record.exposure + "/10" : "—"} · ${jobs}`;
}

function squarify(items, x, y, w, h) {
  if (!items.length) return [];
  if (items.length === 1) return [{ ...items[0], rx: x, ry: y, rw: w, rh: h }];
  const total = items.reduce((sum, item) => sum + item.value, 0);
  if (total === 0) return [];
  const results = [];
  let remaining = [...items];
  let cx = x;
  let cy = y;
  let cw = w;
  let ch = h;

  while (remaining.length) {
    const remainingTotal = remaining.reduce((sum, item) => sum + item.value, 0);
    const vertical = cw >= ch;
    const side = vertical ? ch : cw;
    let row = [remaining[0]];
    let rowSum = remaining[0].value;

    for (let i = 1; i < remaining.length; i += 1) {
      const candidate = [...row, remaining[i]];
      const candidateSum = rowSum + remaining[i].value;
      if (worstAspect(candidate, candidateSum, side, remainingTotal, vertical ? cw : ch) <
          worstAspect(row, rowSum, side, remainingTotal, vertical ? cw : ch)) {
        row = candidate;
        rowSum = candidateSum;
      } else {
        break;
      }
    }

    const rowFraction = rowSum / remainingTotal;
    const rowThickness = vertical ? cw * rowFraction : ch * rowFraction;
    let offset = 0;

    for (const item of row) {
      const itemFraction = item.value / rowSum;
      const itemLength = side * itemFraction;
      if (vertical) results.push({ ...item, rx: cx, ry: cy + offset, rw: rowThickness, rh: itemLength });
      else results.push({ ...item, rx: cx + offset, ry: cy, rw: itemLength, rh: rowThickness });
      offset += itemLength;
    }

    if (vertical) {
      cx += rowThickness;
      cw -= rowThickness;
    } else {
      cy += rowThickness;
      ch -= rowThickness;
    }

    remaining = remaining.slice(row.length);
  }

  return results;
}

function worstAspect(row, rowSum, side, totalArea, availableExtent) {
  const rowExtent = availableExtent * (rowSum / totalArea);
  if (!rowExtent) return Infinity;
  let worst = 0;
  for (const item of row) {
    const itemLength = side * (item.value / rowSum);
    if (!itemLength) continue;
    const aspect = Math.max(rowExtent / itemLength, itemLength / rowExtent);
    if (aspect > worst) worst = aspect;
  }
  return worst;
}

function layout() {
  const frame = document.getElementById("canvasFrame");
  const width = frame.clientWidth;
  const aspect = window.innerWidth < 720 ? 0.9 : 0.6;
  const height = Math.max(440, Math.min(940, Math.round(width * aspect)));
  canvas.width = width * dpr;
  canvas.height = height * dpr;
  canvas.style.width = width + "px";
  canvas.style.height = height + "px";

  const tx = MARGIN;
  const ty = MARGIN;
  const tw = width - MARGIN * 2;
  const th = height - MARGIN * 2;

  const byCategory = {};
  for (const item of visibleData) {
    const category = item.category || "uncategorized";
    if (!byCategory[category]) byCategory[category] = [];
    byCategory[category].push(item);
  }

  const categories = Object.keys(byCategory).map((category) => ({
    cat: category,
    label: byCategory[category][0].category_label,
    items: byCategory[category].sort((a, b) => (b.jobs || 0) - (a.jobs || 0)),
    value: byCategory[category].reduce((sum, item) => sum + Math.max(item.jobs || 0, 1), 0),
  })).sort((a, b) => b.value - a.value);

  categoryRects = squarify(categories, tx, ty, tw, th);
  rects = [];

  for (const categoryRect of categoryRects) {
    const items = categoryRect.items.map((item) => ({ ...item, value: Math.max(item.jobs || 0, 1) }));
    const innerRects = squarify(items, categoryRect.rx + GAP, categoryRect.ry + GAP, categoryRect.rw - GAP * 2, categoryRect.rh - GAP * 2);
    rects.push(...innerRects);
  }
}

function drawCategoryFrames() {
  for (const categoryRect of categoryRects) {
    const rx = categoryRect.rx + 0.5;
    const ry = categoryRect.ry + 0.5;
    const rw = categoryRect.rw - 1;
    const rh = categoryRect.rh - 1;
    if (rw <= 0 || rh <= 0) continue;

    ctx.strokeStyle = GRID;
    ctx.lineWidth = 1;
    ctx.strokeRect(rx, ry, rw, rh);

    if (rw > 110 && rh > 30) {
      ctx.save();
      ctx.fillStyle = INK_SOFT;
      ctx.font = '600 11px "Avenir Next", "Helvetica Neue", sans-serif';
      ctx.textBaseline = "top";
      ctx.fillText(categoryRect.label, rx + 8, ry + 7);
      ctx.restore();
    }
  }
}

function drawTiles() {
  for (const record of rects) {
    const isHovered = record === hovered;
    const rx = record.rx + GAP / 2;
    const ry = record.ry + GAP / 2;
    const rw = record.rw - GAP;
    const rh = record.rh - GAP;
    if (rw <= 0 || rh <= 0) continue;

    const rgb = tileRGB(record);
    const labelColor = luminance(rgb) < 148 ? LIGHT_LABEL : "rgba(32, 27, 23, 0.92)";
    ctx.fillStyle = rgba(rgb, isHovered ? 0.96 : 0.84);
    ctx.fillRect(rx, ry, rw, rh);

    ctx.strokeStyle = isHovered ? GRID_STRONG : rgba(rgb, 0.95);
    ctx.lineWidth = isHovered ? 2 : 1;
    ctx.strokeRect(rx + 0.5, ry + 0.5, rw - 1, rh - 1);

    if (rw > 62 && rh > 24) {
      ctx.save();
      ctx.beginPath();
      ctx.rect(rx + 6, ry + 6, rw - 12, rh - 12);
      ctx.clip();
      const titleSize = Math.min(15, Math.max(9, Math.min(rw / 11, rh / 3.6)));
      ctx.fillStyle = labelColor;
      ctx.font = `600 ${titleSize}px "Avenir Next", "Helvetica Neue", sans-serif`;
      ctx.textBaseline = "top";
      ctx.fillText(record.title, rx + 8, ry + 7);
      if (rh > 40 && rw > 84) {
        ctx.fillStyle = luminance(rgb) < 148 ? "rgba(255, 251, 244, 0.78)" : "rgba(32, 27, 23, 0.68)";
        ctx.font = `500 ${Math.max(8, titleSize - 2)}px "Avenir Next", "Helvetica Neue", sans-serif`;
        ctx.fillText(tileSubInfo(record), rx + 8, ry + 10 + titleSize);
      }
      ctx.restore();
    }
  }
}

function draw() {
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.fillStyle = PAPER;
  ctx.fillRect(0, 0, canvas.width / dpr, canvas.height / dpr);
  drawCategoryFrames();
  drawTiles();
}

function hitTest(mx, my) {
  const bounds = canvas.getBoundingClientRect();
  const cx = mx - bounds.left;
  const cy = my - bounds.top;
  for (let i = rects.length - 1; i >= 0; i -= 1) {
    const record = rects[i];
    if (cx >= record.rx && cx < record.rx + record.rw && cy >= record.ry && cy < record.ry + record.rh) {
      return record;
    }
  }
  return null;
}

function metricHighlight(record) {
  const rgb = tileRGB(record);
  if (!isUSView() || colorMode === "exposure") {
    return `
      <div style="font-size:13px;color:${rgba(rgb, 1)};font-weight:600;">Digital AI Exposure · ${record.exposure != null ? record.exposure + "/10" : "—"}</div>
      <div style="margin-top:5px;height:5px;border-radius:999px;background:rgba(32,27,23,0.08);overflow:hidden;">
        <div style="height:100%;width:${record.exposure != null ? clamp(record.exposure / 10) * 100 : 0}%;background:${rgba(rgb, 1)};"></div>
      </div>`;
  }
  if (colorMode === "outlook") {
    return `
      <div style="font-size:13px;color:${rgba(rgb, 1)};font-weight:600;">BLS Outlook · ${record.outlook != null ? (record.outlook > 0 ? "+" : "") + record.outlook + "%" : "—"}</div>
      <div style="margin-top:5px;height:5px;border-radius:999px;background:rgba(32,27,23,0.08);overflow:hidden;">
        <div style="height:100%;width:${record.outlook != null ? clamp((record.outlook + 10) / 30) * 100 : 0}%;background:${rgba(rgb, 1)};"></div>
      </div>`;
  }
  if (colorMode === "pay") {
    return `
      <div style="font-size:13px;color:${rgba(rgb, 1)};font-weight:600;">Median Pay · ${formatPay(record.pay)}</div>
      <div style="margin-top:5px;height:5px;border-radius:999px;background:rgba(32,27,23,0.08);overflow:hidden;">
        <div style="height:100%;width:${record.pay != null ? clamp((Math.log(Math.max(25000, Math.min(250000, record.pay))) - Math.log(25000)) / (Math.log(250000) - Math.log(25000))) * 100 : 0}%;background:${rgba(rgb, 1)};"></div>
      </div>`;
  }
  return `<div style="font-size:13px;color:${rgba(rgb, 1)};font-weight:600;">Education · ${escapeHtml(record.education || "—")}</div>`;
}

function renderCountryBreakdown(record) {
  if (!record.countryBreakdown || !record.countryBreakdown.length) return "";
  const total = record.countryBreakdown.reduce((sum, item) => sum + item.jobs, 0);
  const rows = record.countryBreakdown
    .slice()
    .sort((a, b) => b.jobs - a.jobs)
    .map((item) => {
      const share = total > 0 ? Math.round((item.jobs / total) * 100) : 0;
      const right = `${formatBigNumber(item.jobs)} · ${share}% · ${item.sourceYear}`;
      return `<div class="tt-country-row"><span>${escapeHtml(item.country)}</span><span>${right}</span></div>`;
    })
    .join("");
  return `<div class="tt-country-title">Country mix</div>${rows}`;
}

    tooltip.querySelector(".tt-stats").innerHTML = `
      <span class="label">Jobs (2024)</span><span class="value">${formatBigNumber(record.jobs)}</span>
      <span class="label">Median pay</span><span class="value">${formatPay(record.pay)}</span>

      <span class="label">Regional jobs</span><span class="value">${formatBigNumber(record.jobs)}</span>
      <span class="label">Mapped taxonomy</span><span class="value">US canonical slug</span>

      <span class="label">Mapping type</span><span class="value">${escapeHtml(record.mappingType || "—")}</span>
      <span class="label">Source year</span><span class="value">${escapeHtml(record.sourceYearLabel || "—")}</span>`;

  let tx = mx + 18;

  if (tx + 360 > window.innerWidth) tx = mx - 378;
  if (ty < 12) ty = my + 18;
  if (ty + 240 > window.innerHeight) ty = Math.max(12, my - 240);

  tooltip.style.left = `${tx}px`;
  tooltip.style.top = `${ty}px`;
  tooltip.classList.add("visible");
}

function hideTooltip() {
  document.getElementById("tooltip").classList.remove("visible");
}

function weightedAverage(records, metricKey) {
  let weighted = 0;
  let jobs = 0;
  for (const record of records) {
    const value = record[metricKey];
    if (value == null || !record.jobs) continue;
    weighted += value * record.jobs;
    jobs += record.jobs;
  }
  return jobs ? weighted / jobs : null;
}

function buildStatCards(view) {
  const summary = view.summary;
  const cards = [];

  if (!isUSView()) {
    cards.push(
      {
        label: "Mapped jobs",
        value: formatBigNumber(summary.totalJobs),
        context: `${summary.countriesCount} countries`,
        detail: `${summary.visibleOccupationsCount} visible occupations from a 342-slug canonical taxonomy`,
      },
      {
        label: "Avg. exposure",
        value: summary.weightedAverageExposure != null ? summary.weightedAverageExposure.toFixed(1) : "—",
        context: "job-weighted across the mapped region",
        detail: "Exposure scores come from the US canonical occupation definitions.",
      },
      {
        label: "Largest category",
        value: summary.largestCategory ? formatBigNumber(summary.largestCategory.jobs) : "—",
        context: summary.largestCategory ? summary.largestCategory.label : "—",
        detail: summary.largestCategory ? `${summary.largestCategory.shareOfJobs}% of mapped jobs` : "",
      },
      {
        label: "Largest country input",
        value: summary.topCountry ? formatBigNumber(summary.topCountry.jobs) : "—",
        context: summary.topCountry ? summary.topCountry.name : "—",
        detail: summary.topCountry ? `Source year ${summary.topCountry.sourceYear}` : "",
      },
      {
        label: "Freshness",
        value: summary.yearStrategy === "latest_shared" ? summary.yearLabel : "Mixed",
        context: summary.freshnessSummary,
        detail: summary.note,
      },
    );
    return cards;
  }

  cards.push({
    label: "Employment footprint",
    value: formatBigNumber(summary.totalJobs),
    context: `${summary.occupationsCount} occupations`,
    detail: "BLS 2024 occupational employment base",
  });

  if (colorMode === "outlook") {
    const avgOutlook = weightedAverage(data, "outlook");
    const growingJobs = data.reduce((sum, item) => sum + ((item.outlook != null && item.outlook > 0 && item.jobs) ? item.jobs : 0), 0);
    cards.push(
      {
        label: "Avg. outlook",
        value: avgOutlook != null ? `${avgOutlook > 0 ? "+" : ""}${avgOutlook.toFixed(1)}%` : "—",
        context: "job-weighted projected growth",
        detail: "Faster growth shifts the treemap toward green.",
      },
      {
        label: "Fastest growth",
        value: summary.fastestGrowingOccupation ? `${summary.fastestGrowingOccupation.outlook > 0 ? "+" : ""}${summary.fastestGrowingOccupation.outlook}%` : "—",
        context: summary.fastestGrowingOccupation ? summary.fastestGrowingOccupation.title : "—",
        detail: "Top BLS growth projection in the dataset",
      },
      {
        label: "Growing jobs",
        value: formatBigNumber(growingJobs),
        context: "occupations with positive outlook",
        detail: "All jobs sitting above 0% projected growth",
      },
      {
        label: "Largest category",
        value: summary.highlights && summary.highlights[0] ? formatBigNumber(summary.highlights[0].value) : "—",
        context: summary.highlights && summary.highlights[0] ? summary.highlights[0].context : "—",
        detail: summary.highlights && summary.highlights[0] ? summary.highlights[0].detail : "",
      },
    );
  } else if (colorMode === "pay") {
    const totalWages = data.reduce((sum, item) => sum + ((item.jobs && item.pay) ? item.jobs * item.pay : 0), 0);
    const topPayCategory = currentView().categories
      .filter((category) => category.averagePay != null)
      .sort((a, b) => b.averagePay - a.averagePay)[0];
    cards.push(
      {
        label: "Avg. pay",
        value: summary.weightedAveragePay != null ? "$" + Math.round(summary.weightedAveragePay / 1000) + "K" : "—",
        context: "job-weighted median pay",
        detail: "Higher-paid occupations deepen toward blue.",
      },
      {
        label: "Highest pay",
        value: summary.highestPayOccupation ? formatPay(summary.highestPayOccupation.pay) : "—",
        context: summary.highestPayOccupation ? summary.highestPayOccupation.title : "—",
        detail: "Top annual median pay in the BLS dataset",
      },
      {
        label: "Annual wage pool",
        value: "$" + (totalWages / 1e12).toFixed(1) + "T",
        context: "jobs × median pay",
        detail: "A rough scale check on where earnings concentrate.",
      },
      {
        label: "Top pay category",
        value: topPayCategory ? "$" + Math.round(topPayCategory.averagePay / 1000) + "K" : "—",
        context: topPayCategory ? topPayCategory.label : "—",
        detail: "Category-level average weighted by employment",
      },
    );
  } else if (colorMode === "education") {
    const bachelorsPlus = data.reduce((sum, item) => sum + ((item.jobs && ["Bachelor's degree", "Master's degree", "Doctoral or professional degree"].includes(item.education)) ? item.jobs : 0), 0);
    const noDegree = data.reduce((sum, item) => sum + ((item.jobs && ["No formal educational credential", "High school diploma or equivalent"].includes(item.education)) ? item.jobs : 0), 0);
    const educationJobs = {};
    for (const item of data) {
      if (!item.education || !item.jobs) continue;
      educationJobs[item.education] = (educationJobs[item.education] || 0) + item.jobs;
    }
    const dominantEducation = Object.entries(educationJobs).sort((a, b) => b[1] - a[1])[0];
    cards.push(
      {
        label: "Bachelor's+ share",
        value: summary.totalJobs ? `${Math.round((bachelorsPlus / summary.totalJobs) * 100)}%` : "—",
        context: "jobs requiring at least a bachelor's degree",
        detail: "The indigo end tracks higher entry credentials.",
      },
      {
        label: "No degree / HS",
        value: formatBigNumber(noDegree),
        context: "jobs without bachelor's entry requirements",
        detail: "Large embodied sectors still dominate the lower-credential base.",
      },
      {
        label: "Most common requirement",
        value: dominantEducation ? dominantEducation[0] : "—",
        context: dominantEducation ? formatBigNumber(dominantEducation[1]) + " jobs" : "—",
        detail: "Weighted by the BLS employment base",
      },
      {
        label: "Largest category",
        value: summary.highlights && summary.highlights[0] ? formatBigNumber(summary.highlights[0].value) : "—",
        context: summary.highlights && summary.highlights[0] ? summary.highlights[0].context : "—",
        detail: summary.highlights && summary.highlights[0] ? summary.highlights[0].detail : "",
      },
    );
  } else {
    const exposedCategory = currentView().categories
      .filter((category) => category.averageExposure != null && category.jobs >= 500000)
      .sort((a, b) => b.averageExposure - a.averageExposure)[0];
    cards.push(
      {
        label: "Avg. exposure",
        value: summary.weightedAverageExposure != null ? summary.weightedAverageExposure.toFixed(1) : "—",
        context: "job-weighted, 0–10 scale",
        detail: "Screen-native work tends to cluster at the warm end.",
      },
      {
        label: "Most exposed at scale",
        value: summary.mostExposedLargeOccupation ? `${summary.mostExposedLargeOccupation.exposure}/10` : "—",
        context: summary.mostExposedLargeOccupation ? summary.mostExposedLargeOccupation.title : "—",
        detail: "Large occupation with the highest AI exposure score",
      },
      {
        label: "Most resilient at scale",
        value: summary.mostResilientLargeOccupation ? `${summary.mostResilientLargeOccupation.exposure}/10` : "—",
        context: summary.mostResilientLargeOccupation ? summary.mostResilientLargeOccupation.title : "—",
        detail: "Large occupation with the lowest AI exposure score",
      },
      {
        label: "Most exposed category",
        value: exposedCategory ? exposedCategory.averageExposure.toFixed(1) : "—",
        context: exposedCategory ? exposedCategory.label : "—",
        detail: "Average exposure weighted by category employment",
      },
    );
  }

  return cards;
}

function renderStatCards() {
  const cards = buildStatCards(currentView());
  document.getElementById("statsGrid").innerHTML = cards.map((card) => `
    <article class="stat-card">
      <div class="label">${escapeHtml(card.label)}</div>
      <div class="value">${escapeHtml(card.value)}</div>
      <div class="context">${escapeHtml(card.context || "")}</div>
      <div class="detail">${escapeHtml(card.detail || "")}</div>
    </article>
  `).join("");
}

function drawGradientLegend() {
  const canvasLegend = document.getElementById("gradientLegend");
  const legendCtx = canvasLegend.getContext("2d");
  const mode = isUSView() ? colorMode : "exposure";
  for (let x = 0; x < canvasLegend.width; x += 1) {
    const t = x / (canvasLegend.width - 1);
    const rgb = mode === "outlook"
      ? mixColor(COLOR_SCALES.outlook.low, COLOR_SCALES.outlook.high, t)
      : mode === "pay"
      ? mixColor(COLOR_SCALES.pay.low, COLOR_SCALES.pay.high, t)
      : mode === "education"
      ? mixColor(COLOR_SCALES.education.low, COLOR_SCALES.education.high, t)
      : mixColor(COLOR_SCALES.exposure.low, COLOR_SCALES.exposure.high, t);
    legendCtx.fillStyle = rgba(rgb, 1);
    legendCtx.fillRect(x, 0, 1, canvasLegend.height);
  }

  const config = LEGEND_CONFIG[mode];
  document.getElementById("legendTitle").textContent = config.title;
  document.getElementById("legendLow").textContent = config.low;
  document.getElementById("legendHigh").textContent = config.high;
  document.getElementById("legendNote").textContent = config.note + (isUSView() ? "" : " Area always encodes mapped employment.");
}

function renderSummaryChips(view) {
  const summary = view.summary;
  document.getElementById("summaryChip1").textContent = `${summary.visibleOccupationsCount || visibleData.length} visible tiles`;
  document.getElementById("summaryChip2").textContent = isUSView()
    ? `Color = ${metricModeLabel()}`
    : "Area = Employment · Color = Digital AI Exposure";
  document.getElementById("summaryChip3").textContent = summary.yearStrategy === "latest_shared"
    ? `Source year ${summary.yearLabel}`
    : `Years ${summary.yearLabel}`;
}

function applyPayloadMetadata() {
  const view = currentView();
  const summary = view.summary;
  document.getElementById("pageTitle").textContent = view.heading;
  document.title = `${view.heading} | bozliu/jobs`;

  const countries = Array.isArray(view.countries) ? view.countries.join(", ") : "";
  const sourceBits = isUSView()
    ? `${countries} · BLS 2024 · ${summary.occupationsCount} occupations`
    : `${countries} · ILOSTAT · ${summary.yearStrategy === "latest_shared" ? "shared year " + summary.yearLabel : "mixed years"} · ${summary.freshnessSummary}`;

  const intro = document.getElementById("introCopy");
  intro.innerHTML = (summary.introHtml || []).map((paragraph) => `<p>${paragraph}</p>`).join("");

  });

function updateModeControls() {
  document.getElementById("colorToggle").hidden = !isUSView();
  document.getElementById("modeChip").hidden = isUSView();
  document.querySelectorAll("#regionToggle button").forEach((button) => {
    button.classList.toggle("active", button.dataset.region === activeRegion);
  });
  document.querySelectorAll("#colorToggle button").forEach((button) => {
    button.classList.toggle("active", button.dataset.mode === colorMode);
  });
}

function coerceState(region, mode) {
  const safeRegion = payload.views[region] ? region : (payload.defaultRegion || "us");
  if (safeRegion !== "us") {
    return { region: safeRegion, mode: "exposure" };
  }
  const allowed = new Set(payload.views.us.availableModes || ["outlook"]);
  return {
    region: safeRegion,
    mode: allowed.has(mode) ? mode : payload.views.us.defaultMode,
  };
}

function syncUrl() {
  const url = new URL(window.location.href);
  url.searchParams.set("region", activeRegion);
  if (activeRegion === "us") url.searchParams.set("mode", usMode);
  else url.searchParams.delete("mode");
  window.history.replaceState({}, "", url);
}

function applyState({ skipUrl = false } = {}) {
  const view = currentView();
  colorMode = isUSView() ? usMode : view.defaultMode;
  data = view.occupations || [];
  visibleData = isUSView() ? data : data.filter((item) => (item.jobs || 0) > 0);
  applyPayloadMetadata();
  updateModeControls();
  renderStatCards();
  drawGradientLegend();
  resize();
  if (!skipUrl) syncUrl();
}

function resize() {
  dpr = window.devicePixelRatio || 1;
  layout();
  draw();
}

canvas.addEventListener("mousemove", (event) => {
  const hit = hitTest(event.clientX, event.clientY);
  if (hit !== hovered) {
    hovered = hit;
    draw();
  }
  if (hovered) {
    showTooltip(hovered, event.clientX, event.clientY);
    canvas.style.cursor = isUSView() && hovered.url ? "pointer" : "default";
  } else {
    hideTooltip();
    canvas.style.cursor = "default";
  }
});

canvas.addEventListener("mouseleave", () => {
  hovered = null;
  hideTooltip();
  draw();
});

canvas.addEventListener("click", (event) => {
  const hit = hitTest(event.clientX, event.clientY);
  if (isUSView() && hit && hit.url) window.open(hit.url, "_blank");
});

document.getElementById("regionToggle").addEventListener("click", (event) => {
  const button = event.target.closest("button");
  if (!button || !button.dataset.region) return;
  const next = coerceState(button.dataset.region, usMode);
  activeRegion = next.region;
  if (activeRegion === "us") usMode = next.mode;
  applyState();
});

document.getElementById("colorToggle").addEventListener("click", (event) => {
  const button = event.target.closest("button");
  if (!button || !button.dataset.mode || !isUSView()) return;
  usMode = button.dataset.mode;
  applyState();
});

window.addEventListener("resize", resize);

fetch("data.json")
  .then((response) => response.json())
  .then((dataPayload) => {
    payload = dataPayload;
    const url = new URL(window.location.href);
    const requestedRegion = url.searchParams.get("region") || payload.defaultRegion || "us";
    const requestedMode = url.searchParams.get("mode") || payload.views.us.defaultMode;
    const next = coerceState(requestedRegion, requestedMode);
    activeRegion = next.region;
    usMode = next.mode;
    applyState();
  });
</script>
