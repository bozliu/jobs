<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jobs Atlas</title>
<link rel="icon" href="data:,">
<style>
*,
*::before,
*::after {
  box-sizing: border-box;
}

:root {
  color-scheme: light;
  --bg: #f5f5f7;
  --surface: #ffffff;
  --surface-2: #fafafc;
  --line: rgba(17, 24, 39, 0.08);
  --line-strong: rgba(17, 24, 39, 0.14);
  --text: #101114;
  --muted: #6b7280;
  --muted-2: #8b92a0;
  --accent: #1d4ed8;
  --shadow: 0 24px 70px rgba(15, 23, 42, 0.08);
  --radius-xl: 28px;
  --radius-lg: 20px;
  --radius-md: 16px;
  --radius-sm: 12px;
  --content-width: min(1440px, calc(100vw - 28px));
  --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
}

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  min-width: 320px;
  background:
    radial-gradient(circle at top left, rgba(255, 255, 255, 0.95), rgba(245, 245, 247, 0.94) 55%),
    var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

a {
  color: inherit;
  text-decoration: none;
}

button,
input {
  font: inherit;
}

.shell {
  width: var(--content-width);
  margin: 0 auto;
  padding: 20px 0 40px;
}

.header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 20px;
  margin-bottom: 18px;
}

.brand {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.brand-kicker {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
}

.brand h1 {
  margin: 0;
  font-size: clamp(32px, 5vw, 64px);
  font-weight: 700;
  letter-spacing: -0.06em;
  line-height: 0.92;
}

.brand p {
  margin: 0;
  max-width: 760px;
  font-size: 16px;
  line-height: 1.7;
  color: var(--muted);
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: flex-end;
}

.header-actions a,
.header-actions button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 40px;
  padding: 0 16px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.76);
  color: var(--text);
  transition:
    transform 220ms var(--ease-out),
    border-color 220ms var(--ease-out),
    box-shadow 220ms var(--ease-out);
}

.header-actions a:hover,
.header-actions a:focus-visible,
.header-actions button:hover,
.header-actions button:focus-visible {
  transform: translateY(-1px);
  border-color: var(--line-strong);
  box-shadow: 0 12px 24px rgba(15, 23, 42, 0.08);
  outline: none;
}

.board {
  border-radius: var(--radius-xl);
  background: rgba(255, 255, 255, 0.84);
  border: 1px solid rgba(17, 24, 39, 0.06);
  box-shadow: var(--shadow);
  overflow: hidden;
  backdrop-filter: blur(18px);
}

.board-top {
  padding: 20px;
  border-bottom: 1px solid var(--line);
}

.top-grid {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 18px;
  align-items: end;
}

.stats-row,
.highlights-row,
.category-row {
  display: grid;
  gap: 10px;
}

.stats-row {
  grid-template-columns: repeat(4, minmax(0, 1fr));
  margin-top: 16px;
}

.highlights-row {
  grid-template-columns: repeat(4, minmax(0, 1fr));
  margin-top: 10px;
}

.category-row {
  grid-template-columns: repeat(5, minmax(0, 1fr));
  margin-top: 10px;
}

.stat-card,
.highlight-card,
.category-card {
  border-radius: var(--radius-md);
  border: 1px solid var(--line);
  background: var(--surface);
  padding: 14px 16px;
}

.stat-card small,
.highlight-card small,
.category-card small,
.panel-section small,
.legend small {
  display: block;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted-2);
}

.stat-card strong,
.highlight-card strong,
.category-card strong {
  display: block;
  margin-top: 10px;
  font-size: 24px;
  line-height: 1;
  letter-spacing: -0.04em;
}

.stat-card p,
.highlight-card p,
.category-card p,
.panel-section p {
  margin: 8px 0 0;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.55;
}

.highlight-card strong,
.category-card strong {
  font-size: 18px;
}

.highlight-card .context,
.category-card .context {
  display: block;
  margin-top: 8px;
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
}

.toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: flex-end;
}

.mode-toggle {
  display: inline-flex;
  gap: 6px;
  padding: 6px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: var(--surface);
}

.mode-toggle button {
  min-height: 38px;
  padding: 0 14px;
  border: 0;
  border-radius: 999px;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition:
    background-color 180ms var(--ease-out),
    color 180ms var(--ease-out);
}

.mode-toggle button.active {
  background: #111827;
  color: white;
}

.legend {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  min-height: 50px;
  padding: 0 14px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: var(--surface);
}

.legend-bar {
  width: 120px;
  height: 10px;
  border-radius: 999px;
}

.legend span {
  font-size: 13px;
  color: var(--muted);
}

.board-main {
  display: grid;
  grid-template-columns: minmax(0, 1.45fr) 360px;
  min-height: 760px;
}

.chart-shell {
  position: relative;
  min-height: 760px;
  padding: 12px;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.7), rgba(250, 250, 252, 0.95));
}

.chart {
  position: relative;
  height: 100%;
  min-height: 736px;
  border-radius: 24px;
  background: var(--surface-2);
  overflow: hidden;
  border: 1px solid rgba(17, 24, 39, 0.05);
}

.category-box {
  position: absolute;
  overflow: hidden;
  border-radius: 22px;
  border: 1px solid rgba(17, 24, 39, 0.06);
  background: rgba(255, 255, 255, 0.26);
}

.category-label {
  position: absolute;
  top: 12px;
  left: 12px;
  z-index: 1;
  max-width: calc(100% - 24px);
  padding: 6px 10px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.82);
  color: var(--text);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.tile {
  position: absolute;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  gap: 3px;
  padding: 10px;
  border: 0;
  border-radius: 18px;
  color: white;
  text-align: left;
  cursor: pointer;
  overflow: hidden;
  transition:
    transform 160ms var(--ease-out),
    box-shadow 160ms var(--ease-out),
    opacity 160ms var(--ease-out),
    filter 160ms var(--ease-out);
}

.tile::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.18), transparent 38%);
  pointer-events: none;
}

.tile::after {
  content: "";
  position: absolute;
  inset: auto 0 0;
  height: 64%;
  background: linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.34));
  pointer-events: none;
}

.tile > * {
  position: relative;
  z-index: 1;
}

.tile:hover,
.tile:focus-visible,
.tile.is-active {
  transform: translateY(-1px);
  box-shadow: 0 16px 34px rgba(15, 23, 42, 0.18);
  outline: none;
}

.tile.is-dimmed {
  opacity: 0.58;
  filter: saturate(0.8);
}

.tile h3 {
  margin: 0;
  font-size: clamp(11px, 0.95vw, 15px);
  line-height: 1.08;
  letter-spacing: -0.03em;
}

.tile span {
  font-size: 11px;
  color: rgba(255, 255, 255, 0.88);
}

.tile[data-density="micro"] h3,
.tile[data-density="micro"] span {
  display: none;
}

.tile[data-density="compact"] {
  padding: 8px;
}

.panel {
  border-left: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.92);
  padding: 20px;
}

.panel-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}

.panel-header h2 {
  margin: 8px 0 0;
  font-size: 28px;
  line-height: 0.98;
  letter-spacing: -0.05em;
}

.pill {
  display: inline-flex;
  align-items: center;
  min-height: 28px;
  padding: 0 10px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: var(--surface);
  color: var(--muted);
  font-size: 12px;
  font-weight: 600;
}

.panel-copy {
  margin: 10px 0 0;
  color: var(--muted);
  font-size: 14px;
  line-height: 1.7;
}

.panel-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
  margin-top: 16px;
}

.metric {
  border-radius: var(--radius-sm);
  border: 1px solid var(--line);
  background: var(--surface);
  padding: 12px;
}

.metric small {
  display: block;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted-2);
}

.metric strong {
  display: block;
  margin-top: 8px;
  font-size: 18px;
  line-height: 1.08;
  letter-spacing: -0.03em;
}

.panel-section {
  margin-top: 18px;
  padding-top: 18px;
  border-top: 1px solid var(--line);
}

.compare-list {
  display: grid;
  gap: 8px;
  margin-top: 10px;
}

.compare-item {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  background: var(--surface);
  border: 1px solid var(--line);
}

.compare-item strong {
  display: block;
  font-size: 13px;
  line-height: 1.35;
}

.compare-item span {
  display: block;
  font-size: 12px;
  color: var(--muted);
  line-height: 1.4;
  text-align: right;
}

.panel-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 20px;
}

.panel-actions a {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 42px;
  padding: 0 14px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: var(--surface);
}

.panel-actions a.primary {
  background: #111827;
  border-color: #111827;
  color: white;
}

.footer {
  display: flex;
  justify-content: space-between;
  gap: 14px;
  flex-wrap: wrap;
  padding: 16px 4px 0;
  color: var(--muted);
  font-size: 13px;
}

@media (max-width: 1200px) {
  .board-main {
    grid-template-columns: 1fr;
  }

  .panel {
    border-left: 0;
    border-top: 1px solid var(--line);
  }

  .stats-row,
  .highlights-row {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .category-row {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }
}

@media (max-width: 840px) {
  .header,
  .top-grid {
    grid-template-columns: 1fr;
    display: grid;
  }

  .header-actions,
  .toolbar {
    justify-content: flex-start;
  }

  .stats-row,
  .highlights-row,
  .category-row,
  .panel-grid {
    grid-template-columns: 1fr;
  }

  .mode-toggle {
    width: 100%;
    overflow-x: auto;
  }

  .legend {
    width: 100%;
    justify-content: space-between;
  }

  .chart-shell,
  .chart {
    min-height: 580px;
  }
}

@media (prefers-reduced-motion: reduce) {
  html {
    scroll-behavior: auto;
  }

  *,
  *::before,
  *::after {
    transition-duration: 0.01ms !important;
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
  }
}
</style>
</head>
<body>
  <div class="shell">
    <header class="header">
      <div class="brand">
        <span class="brand-kicker">BLS Occupations / AI Exposure / Treemap</span>
        <h1>One interactive map of the U.S. job market.</h1>
        <p id="introCopy">Loading the latest dataset.</p>
      </div>
      <div class="header-actions">
        <a id="repoLink" href="https://github.com/bozliu/jobs" target="_blank" rel="noreferrer">GitHub</a>
        <a id="sourceLink" href="https://www.bls.gov/ooh/" target="_blank" rel="noreferrer">BLS source</a>
      </div>
    </header>

    <section class="board">
      <div class="board-top">
        <div class="top-grid">
          <div>
            <div class="stats-row" id="statsRow"></div>
            <div class="highlights-row" id="highlightsRow"></div>
            <div class="category-row" id="categoryRow"></div>
          </div>
          <div class="toolbar">
            <div class="mode-toggle" id="modeToggle" aria-label="Choose metric"></div>
            <div class="legend" id="legend"></div>
          </div>
        </div>
      </div>

      <div class="board-main">
        <div class="chart-shell">
          <div class="chart" id="chart" aria-label="Interactive occupation treemap"></div>
        </div>
        <aside class="panel" id="panel" aria-live="polite"></aside>
      </div>
    </section>

    <footer class="footer">
      <span id="footerMeta">Loading metadata.</span>
      <span>Everything on this page is driven by the interactive map and its active selection.</span>
    </footer>
  </div>

<script>
const MODE_CONFIG = {
  exposure: {
    label: "AI Exposure",
    low: "Lower",
    high: "Higher",
    gradient: "linear-gradient(90deg, rgb(100, 161, 143), rgb(212, 187, 112), rgb(193, 98, 62))",
  },
  outlook: {
    label: "Outlook",
    low: "Declining",
    high: "Growing",
    gradient: "linear-gradient(90deg, rgb(203, 92, 67), rgb(220, 173, 106), rgb(90, 160, 149))",
  },
  pay: {
    label: "Pay",
    low: "Lower",
    high: "Higher",
    gradient: "linear-gradient(90deg, rgb(184, 180, 173), rgb(217, 190, 123), rgb(145, 107, 52))",
  },
  education: {
    label: "Education",
    low: "Lower barrier",
    high: "More credentialed",
    gradient: "linear-gradient(90deg, rgb(110, 164, 155), rgb(182, 184, 125), rgb(123, 108, 155))",
  },
};

const EDUCATION_LEVELS = [
  "No formal educational credential",
  "High school diploma or equivalent",
  "Postsecondary nondegree award",
  "Some college, no degree",
  "Associate's degree",
  "Bachelor's degree",
  "Master's degree",
  "Doctoral or professional degree",
];

let dataset = null;
let activeMode = "exposure";
let selectedSlug = null;
let chartRecords = [];
let resizeTimer = null;

function formatInteger(value) {
  if (value == null) return "N/A";
  return new Intl.NumberFormat("en-US").format(value);
}

function formatCompact(value, max = 1) {
  if (value == null) return "N/A";
  return new Intl.NumberFormat("en-US", {
    notation: "compact",
    maximumFractionDigits: max,
  }).format(value);
}

function formatCurrency(value) {
  if (value == null) return "N/A";
  return new Intl.NumberFormat("en-US", {
    style: "currency",
    currency: "USD",
    maximumFractionDigits: 0,
  }).format(value);
}

function formatPercent(value) {
  if (value == null) return "N/A";
  return `${value > 0 ? "+" : ""}${value}%`;
}

function formatScore(value) {
  if (value == null) return "N/A";
  return `${Number(value).toFixed(1)}/10`;
}

function formatValue(value, format) {
  if (format === "jobs") return formatCompact(value);
  if (format === "currency") return formatCurrency(value);
  if (format === "percent") return formatPercent(value);
  if (format === "score") return formatScore(value);
  return formatInteger(value);
}

function formatJobs(value) {
  if (value == null) return "N/A";
  if (value >= 1000000) return `${(value / 1000000).toFixed(1)}M jobs`;
  if (value >= 1000) return `${Math.round(value / 1000)}K jobs`;
  return `${formatInteger(value)} jobs`;
}

function clamp(value, min, max) {
  return Math.min(max, Math.max(min, value));
}

function lerpColor(from, to, t) {
  const ratio = clamp(t, 0, 1);
  const values = from.map((channel, index) => Math.round(channel + (to[index] - channel) * ratio));
  return `rgb(${values.join(", ")})`;
}

function tileColor(record, mode) {
  if (mode === "outlook") {
    if (record.outlook == null) return "rgb(186, 183, 177)";
    const ratio = clamp((record.outlook + 12) / 62, 0, 1);
    if (ratio < 0.5) return lerpColor([203, 92, 67], [220, 173, 106], ratio / 0.5);
    return lerpColor([220, 173, 106], [90, 160, 149], (ratio - 0.5) / 0.5);
  }

  if (mode === "pay") {
    if (record.pay == null) return "rgb(186, 183, 177)";
    const value = clamp(record.pay, 25000, 250000);
    const ratio = (Math.log(value) - Math.log(25000)) / (Math.log(250000) - Math.log(25000));
    return lerpColor([184, 180, 173], [145, 107, 52], ratio);
  }

  if (mode === "education") {
    const index = EDUCATION_LEVELS.indexOf(record.education);
    if (index < 0) return "rgb(186, 183, 177)";
    const palette = [
      "rgb(110, 164, 155)",
      "rgb(128, 171, 155)",
      "rgb(148, 177, 148)",
      "rgb(166, 181, 137)",
      "rgb(184, 181, 125)",
      "rgb(174, 156, 130)",
      "rgb(150, 129, 143)",
      "rgb(123, 108, 155)",
    ];
    return palette[index];
  }

  if (record.exposure == null) return "rgb(186, 183, 177)";
  const ratio = clamp(record.exposure / 10, 0, 1);
  if (ratio < 0.55) return lerpColor([100, 161, 143], [212, 187, 112], ratio / 0.55);
  return lerpColor([212, 187, 112], [193, 98, 62], (ratio - 0.55) / 0.45);
}

function tileMeta(record, mode) {
  if (mode === "outlook") return `${formatPercent(record.outlook)} / ${formatJobs(record.jobs)}`;
  if (mode === "pay") return `${formatCurrency(record.pay)} / ${formatJobs(record.jobs)}`;
  if (mode === "education") return `${record.education || "N/A"} / ${formatJobs(record.jobs)}`;
  return `${formatScore(record.exposure)} / ${formatJobs(record.jobs)}`;
}

function squarify(items, x, y, width, height) {
  if (!items.length) return [];
  if (items.length === 1) return [{ ...items[0], x, y, width, height }];

  const result = [];
  let remaining = [...items];
  let originX = x;
  let originY = y;
  let w = width;
  let h = height;

  while (remaining.length) {
    const total = remaining.reduce((sum, item) => sum + item.value, 0);
    const vertical = w >= h;
    const side = vertical ? h : w;
    let row = [remaining[0]];
    let rowSum = remaining[0].value;

    for (let index = 1; index < remaining.length; index += 1) {
      const candidate = [...row, remaining[index]];
      const candidateSum = rowSum + remaining[index].value;
      if (
        worstAspect(candidate, candidateSum, side, total, vertical ? w : h) <
        worstAspect(row, rowSum, side, total, vertical ? w : h)
      ) {
        row = candidate;
        rowSum = candidateSum;
      } else {
        break;
      }
    }

    const rowFraction = rowSum / total;
    const thickness = vertical ? w * rowFraction : h * rowFraction;
    let offset = 0;

    row.forEach((item) => {
      const ratio = item.value / rowSum;
      const length = side * ratio;
      if (vertical) {
        result.push({ ...item, x: originX, y: originY + offset, width: thickness, height: length });
      } else {
        result.push({ ...item, x: originX + offset, y: originY, width: length, height: thickness });
      }
      offset += length;
    });

    if (vertical) {
      originX += thickness;
      w -= thickness;
    } else {
      originY += thickness;
      h -= thickness;
    }

    remaining = remaining.slice(row.length);
  }

  return result;
}

function worstAspect(row, rowSum, side, total, extent) {
  const rowExtent = extent * (rowSum / total);
  if (!rowExtent) return Infinity;
  let worst = 0;
  row.forEach((item) => {
    const itemExtent = side * (item.value / rowSum);
    if (!itemExtent) return;
    const aspect = Math.max(rowExtent / itemExtent, itemExtent / rowExtent);
    if (aspect > worst) worst = aspect;
  });
  return worst;
}

function getSelectedRecord() {
  const fallback = dataset.summary.mostExposedLargeOccupation?.slug || dataset.occupations[0]?.slug;
  const slug = selectedSlug || fallback;
  return dataset.occupations.find((item) => item.slug === slug) || dataset.occupations[0];
}

function renderHeader() {
  const summary = dataset.summary;
  document.getElementById("introCopy").textContent =
    `Explore ${formatCompact(summary.totalJobs)} jobs across ${summary.occupationsCount} occupations. The map sizes roles by employment and lets you recolor everything by outlook, pay, required education, or AI exposure.`;
  document.getElementById("repoLink").href = summary.repoUrl;
  document.getElementById("sourceLink").href = summary.sourceUrl;
}

function renderStats() {
  document.getElementById("statsRow").innerHTML = dataset.summary.heroStats.map((item) => `
    <article class="stat-card">
      <small>${item.label}</small>
      <strong>${formatValue(item.value, item.format)}</strong>
      <p>${item.detail}</p>
    </article>
  `).join("");

  document.getElementById("highlightsRow").innerHTML = dataset.summary.highlights.map((item) => `
    <article class="highlight-card">
      <small>${item.title}</small>
      <strong>${formatValue(item.value, item.format)}</strong>
      <span class="context">${item.context}</span>
      <p>${item.detail}</p>
    </article>
  `).join("");

  document.getElementById("categoryRow").innerHTML = dataset.categories.slice(0, 5).map((category) => `
    <article class="category-card">
      <small>${category.label}</small>
      <strong>${formatCompact(category.jobs)}</strong>
      <span class="context">${category.occupationCount} roles</span>
      <p>${category.shareOfJobs.toFixed(1)}% of mapped employment</p>
    </article>
  `).join("");
}

function renderControls() {
  const modeToggle = document.getElementById("modeToggle");
  modeToggle.innerHTML = Object.entries(MODE_CONFIG).map(([key, config]) => `
    <button type="button" data-mode="${key}" class="${activeMode === key ? "active" : ""}">${config.label}</button>
  `).join("");

  modeToggle.querySelectorAll("button").forEach((button) => {
    button.addEventListener("click", () => {
      activeMode = button.dataset.mode;
      renderControls();
      renderTreemap();
      renderPanel();
    });
  });

  const legendConfig = MODE_CONFIG[activeMode];
  document.getElementById("legend").innerHTML = `
    <small>${legendConfig.label}</small>
    <span>${legendConfig.low}</span>
    <div class="legend-bar" style="background:${legendConfig.gradient}"></div>
    <span>${legendConfig.high}</span>
  `;
}

function renderTreemap() {
  const chart = document.getElementById("chart");
  const width = chart.clientWidth;
  const height = chart.clientHeight;
  chart.innerHTML = "";

  const categories = dataset.categories.map((category) => ({
    ...category,
    value: category.jobs || 1,
    items: dataset.occupations
      .filter((occupation) => occupation.category === category.slug)
      .map((occupation) => ({ ...occupation, value: occupation.jobs || 1 })),
  }));

  const categoryRects = squarify(categories, 0, 0, width, height);
  const selected = getSelectedRecord();

  categoryRects.forEach((categoryRect) => {
    const categoryBox = document.createElement("div");
    categoryBox.className = "category-box";
    categoryBox.style.left = `${categoryRect.x + 5}px`;
    categoryBox.style.top = `${categoryRect.y + 5}px`;
    categoryBox.style.width = `${Math.max(categoryRect.width - 10, 0)}px`;
    categoryBox.style.height = `${Math.max(categoryRect.height - 10, 0)}px`;

    const label = document.createElement("div");
    label.className = "category-label";
    label.textContent = categoryRect.label;
    if (categoryRect.width < 160 || categoryRect.height < 80) {
      label.style.display = "none";
    }
    categoryBox.appendChild(label);
    chart.appendChild(categoryBox);

    const tiles = squarify(
      categoryRect.items,
      categoryRect.x + 10,
      categoryRect.y + 10,
      Math.max(categoryRect.width - 20, 0),
      Math.max(categoryRect.height - 20, 0)
    );

    tiles.forEach((tileRect) => {
      const tile = document.createElement("button");
      const area = tileRect.width * tileRect.height;
      const density = area < 4200 ? "micro" : area < 8400 ? "compact" : "default";
      tile.type = "button";
      tile.className = "tile";
      tile.dataset.density = density;
      tile.style.left = `${tileRect.x}px`;
      tile.style.top = `${tileRect.y}px`;
      tile.style.width = `${Math.max(tileRect.width - 4, 0)}px`;
      tile.style.height = `${Math.max(tileRect.height - 4, 0)}px`;
      tile.style.background = `
        linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.02)),
        linear-gradient(135deg, ${tileColor(tileRect, activeMode)}, color-mix(in srgb, ${tileColor(tileRect, activeMode)} 74%, black 26%))
      `;
      tile.setAttribute("aria-label", `${tileRect.title}, ${tileMeta(tileRect, activeMode)}`);
      if (selected && tileRect.slug === selected.slug) tile.classList.add("is-active");
      if (selected && tileRect.slug !== selected.slug) tile.classList.add("is-dimmed");
      tile.innerHTML = `
        <h3>${tileRect.title}</h3>
        <span>${tileMeta(tileRect, activeMode)}</span>
      `;

      tile.addEventListener("mouseenter", () => {
        selectedSlug = tileRect.slug;
        renderPanel();
      });
      tile.addEventListener("focus", () => {
        selectedSlug = tileRect.slug;
        renderTreemap();
        renderPanel();
      });
      tile.addEventListener("click", () => {
        selectedSlug = tileRect.slug;
        renderTreemap();
        renderPanel();
      });

      chart.appendChild(tile);
    });
  });
}

function insightText(record) {
  if (activeMode === "pay") {
    const delta = record.pay != null && dataset.summary.weightedAveragePay != null
      ? record.pay - dataset.summary.weightedAveragePay
      : null;
    if (delta == null) return "Pay data is unavailable for this role.";
    return delta >= 0
      ? `This role sits ${formatCurrency(delta)} above the job-weighted pay baseline.`
      : `This role sits ${formatCurrency(Math.abs(delta))} below the job-weighted pay baseline.`;
  }

  if (activeMode === "outlook") {
    const delta = record.outlook != null && dataset.summary.weightedAverageOutlook != null
      ? record.outlook - dataset.summary.weightedAverageOutlook
      : null;
    if (delta == null) return "Growth data is unavailable for this role.";
    return delta >= 0
      ? `This role runs ${delta.toFixed(1)} percentage points above the weighted market outlook.`
      : `This role runs ${Math.abs(delta).toFixed(1)} percentage points below the weighted market outlook.`;
  }

  if (activeMode === "education") {
    return `The standard entry path is ${record.education || "unspecified"}, which shapes how quickly talent supply can expand.`;
  }

  const delta = record.exposure != null && dataset.summary.weightedAverageExposure != null
    ? record.exposure - dataset.summary.weightedAverageExposure
    : null;
  if (delta == null) return "Exposure scoring is unavailable for this role.";
  return delta >= 0
    ? `This role lands ${delta.toFixed(1)} points above the job-weighted AI exposure average.`
    : `This role lands ${Math.abs(delta).toFixed(1)} points below the job-weighted AI exposure average.`;
}

function compareItems(record) {
  const category = dataset.categories.find((item) => item.slug === record.category);
  if (!category || !category.topOccupations) return [];
  return category.topOccupations;
}

function renderPanel() {
  const record = getSelectedRecord();
  const compare = compareItems(record);
  const panel = document.getElementById("panel");

  panel.innerHTML = `
    <div class="panel-header">
      <div>
        <span class="pill">${record.category_label}</span>
        <h2>${record.title}</h2>
      </div>
      <span class="pill">${MODE_CONFIG[activeMode].label}</span>
    </div>
    <p class="panel-copy">${insightText(record)}</p>

    <div class="panel-grid">
      <div class="metric">
        <small>Employment</small>
        <strong>${formatJobs(record.jobs)}</strong>
      </div>
      <div class="metric">
        <small>Median Pay</small>
        <strong>${formatCurrency(record.pay)}</strong>
      </div>
      <div class="metric">
        <small>Outlook</small>
        <strong>${formatPercent(record.outlook)}</strong>
      </div>
      <div class="metric">
        <small>AI Exposure</small>
        <strong>${formatScore(record.exposure)}</strong>
      </div>
    </div>

    <div class="panel-section">
      <small>Entry profile</small>
      <p>${record.education || "Education path unavailable"} / ${record.outlook_desc || "Outlook label unavailable"}</p>
    </div>

    <div class="panel-section">
      <small>Exposure rationale</small>
      <p>${record.exposure_rationale || "No exposure rationale is available for this role."}</p>
    </div>

    <div class="panel-section">
      <small>Largest roles in this family</small>
      <div class="compare-list">
        ${compare.map((item) => `
          <div class="compare-item">
            <strong>${item.title}</strong>
            <span>${formatJobs(item.jobs)}<br>${formatScore(item.exposure)}</span>
          </div>
        `).join("")}
      </div>
    </div>

    <div class="panel-actions">
      <a class="primary" href="${record.url}" target="_blank" rel="noreferrer">Open BLS page</a>
      <a href="${dataset.summary.repoUrl}" target="_blank" rel="noreferrer">Open repo</a>
    </div>
  `;
}

async function loadData() {
  const response = await fetch("./data.json");
  if (!response.ok) throw new Error(`Failed to fetch data.json: ${response.status}`);
  return response.json();
}

function renderFooter() {
  const generatedAt = new Date(dataset.generatedAt);
  const formatted = `${new Intl.DateTimeFormat("en-US", {
    dateStyle: "long",
    timeStyle: "short",
    timeZone: "UTC",
  }).format(generatedAt)} UTC`;
  document.getElementById("footerMeta").textContent =
    `Generated from ${dataset.summary.occupationsCount} occupations and ${formatInteger(dataset.summary.totalJobs)} jobs. Last payload build: ${formatted}.`;
}

function init() {
  renderHeader();
  renderStats();
  renderControls();
  renderTreemap();
  renderPanel();
  renderFooter();
}

window.addEventListener("resize", () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (dataset) renderTreemap();
  }, 100);
});

loadData()
  .then((payload) => {
    dataset = payload;
    chartRecords = payload.occupations;
    selectedSlug = payload.summary.mostExposedLargeOccupation?.slug || payload.occupations[0]?.slug || null;
    init();
  })
  .catch((error) => {
    document.getElementById("introCopy").textContent = "Failed to load site data. Rebuild the static payload and refresh.";
    document.getElementById("footerMeta").textContent = error.message;
    console.error(error);
  });
</script>
</body>
</html>
